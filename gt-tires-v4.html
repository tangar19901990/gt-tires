      +'</tbody></table>';
  }

  if(id==='clients'){
    var rows3 = DB.clients.map(function(c,i){
      var ords = DB.orders.filter(function(o){ return o.client&&o.client.id===c.id; });
      var rev  = ords.reduce(function(s,o){ return s+calcT(o.works); },0);
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(c.name)+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(c.phone||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(c.company||'')+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:12px">'+ords.length+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:700;font-family:monospace">'+fmtM(rev)+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:700;font-family:monospace;color:'+(c.debt>0?'red':'green')+'">'+fmtM(c.debt)+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Звіт по клієнтах')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">Клієнт</th><th style="padding:6px 8px;text-align:left;font-size:10px">Телефон</th><th style="padding:6px 8px;text-align:left;font-size:10px">Фірма</th><th style="padding:6px 8px;text-align:center;font-size:10px">Заказів</th><th style="padding:6px 8px;text-align:right;font-size:10px">Оборот</th><th style="padding:6px 8px;text-align:right;font-size:10px">Борг</th></tr></thead><tbody>'+rows3+'</tbody></table>';
  }

  if(id==='warehouse'){
    var rows4 = DB.warehouse.map(function(w,i){
      var low = w.stock<=w.min;
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(w.name)+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(w.cat)+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:13px;font-weight:900;color:'+(low?'red':'#000')+'">'+w.stock+' '+esc(w.unit)+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:11px;color:#888">'+w.min+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-family:monospace">₴'+w.price+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:11px;font-weight:700;color:'+(low?'red':'green')+'">'+(low?'⚠️ КРИТИЧНО':'✓ ОК')+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Залишки складу')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">Позиція</th><th style="padding:6px 8px;text-align:left;font-size:10px">Категорія</th><th style="padding:6px 8px;text-align:center;font-size:10px">Залишок</th><th style="padding:6px 8px;text-align:center;font-size:10px">Мін.</th><th style="padding:6px 8px;text-align:right;font-size:10px">Ціна</th><th style="padding:6px 8px;text-align:center;font-size:10px">Статус</th></tr></thead><tbody>'+rows4+'</tbody></table>';
  }

  if(id==='salary'){
    var workers = DB.workers||[];
    function calcWS(w){
      if(w.type==='fixed') return w.base||0;
      var wOrds = DB.orders.filter(function(o){ return inMonth(o)&&o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name)); });
      var rev = wOrds.reduce(function(s,o){ return s+calcT(o.works); },0);
      return (w.base||0)+rev*((w.percent||0)/100);
    }
    var rows5 = workers.map(function(w,i){
      var wOrds = DB.orders.filter(function(o){ return inMonth(o)&&o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name)); });
      var rev   = wOrds.reduce(function(s,o){ return s+calcT(o.works); },0);
      var sal   = calcWS(w);
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:7px 10px;font-size:13px;font-weight:700">'+esc(w.name)+'</td>'
        +'<td style="padding:7px 10px;font-size:11px">'+esc(w.role||'')+'</td>'
        +'<td style="padding:7px 10px;text-align:center;font-size:12px">'+(w.type==='percent'?w.percent+'%':'Фікс.')+'</td>'
        +'<td style="padding:7px 10px;text-align:center;font-size:12px">'+wOrds.length+'</td>'
        +'<td style="padding:7px 10px;text-align:right;font-size:12px;font-family:monospace">'+fmtM(rev)+'</td>'
        +'<td style="padding:7px 10px;text-align:right;font-size:13px;font-weight:900;font-family:monospace;color:green">'+fmtM(sal)+'</td>'
        +'<td style="padding:7px 10px;text-align:center;font-size:11px">___________</td>'
        +'</tr>';
    }).join('');
    var totalSal = workers.reduce(function(s,w){ return s+calcWS(w); },0);
    return repHeader('Зарплатна відомість')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:7px 10px;text-align:left;font-size:10px">Майстер</th><th style="padding:7px 10px;text-align:left;font-size:10px">Посада</th><th style="padding:7px 10px;text-align:center;font-size:10px">Тип ЗП</th><th style="padding:7px 10px;text-align:center;font-size:10px">Заказів</th><th style="padding:7px 10px;text-align:right;font-size:10px">Виручка</th><th style="padding:7px 10px;text-align:right;font-size:10px">До виплати</th><th style="padding:7px 10px;text-align:center;font-size:10px">Підпис</th></tr></thead><tbody>'+rows5+'</tbody>'
      +'<tfoot><tr style="background:#f0a500"><td colspan="5" style="padding:8px 10px;font-weight:900;font-size:13px">ЗАГАЛЬНИЙ ФОНД:</td><td style="padding:8px 10px;font-weight:900;font-size:14px;text-align:right;font-family:monospace">'+fmtM(totalSal)+'</td><td></td></tr></tfoot></table>';
  }

  if(id==='services'){
    var cats = Object.keys(SERVICES);
    var rows6 = '';
    cats.forEach(function(cat){
      rows6 += '<tr style="background:#f0a500"><td colspan="2" style="padding:8px 10px;font-size:13px;font-weight:900">'+esc(cat)+'</td></tr>';
      (SERVICES[cat]||[]).forEach(function(s,i){
        rows6 += '<tr style="background:'+(i%2?'#fafafa':'#fff')+'"><td style="padding:7px 10px;font-size:12px">'+esc(s.name)+'</td><td style="padding:7px 10px;text-align:right;font-size:13px;font-weight:700;font-family:monospace;white-space:nowrap">'+(s.price?'₴'+s.price.toLocaleString('uk-UA'):'договірна')+'</td></tr>';
      });
    });
    return repHeader('Прайс-лист послуг')
      +'<table style="width:100%;border-collapse:collapse">'+rows6+'</table>';
  }

  if(id==='tires'){
    var rows7 = (DB.tires||[]).map(function(t,i){
      var c = t.clientId ? DB.clients.find(function(x){ return x.id===t.clientId; }) : null;
      var condLabel = {new:'Нова',good:'Хороша',worn:'Зношена',damaged:'Пошкоджена'}[t.condition]||t.condition||'—';
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(t.brand||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:12px;font-family:monospace;font-weight:700">'+esc(t.size||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(t.ttype==='new'?'Нова':'Б/у')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+condLabel+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(c?esc(c.name):'Наша')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(t.location||'—')+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-family:monospace">'+(t.sellPrice?fmtM(t.sellPrice):'—')+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('База шин')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">Марка</th><th style="padding:6px 8px;text-align:left;font-size:10px">Розмір</th><th style="padding:6px 8px;text-align:left;font-size:10px">Тип</th><th style="padding:6px 8px;text-align:left;font-size:10px">Стан</th><th style="padding:6px 8px;text-align:left;font-size:10px">Власник</th><th style="padding:6px 8px;text-align:left;font-size:10px">Локація</th><th style="padding:6px 8px;text-align:right;font-size:10px">Ціна продажу</th></tr></thead><tbody>'+rows7+'</tbody></table>';
  }
  return '<div style="padding:40px;text-align:center;color:#999">Звіт не знайдено</div>';
}

/* ═══ GLOBAL SEARCH ═══ */
function toggleSearch(){
  var ov = document.getElementById('search-overlay');
  if(!ov){ createSearchOverlay(); return; }
  if(ov.classList.contains('open')){
    ov.classList.remove('open');
  } else {
    ov.classList.add('open');
    var inp = document.getElementById('gs-input');
    if(inp){ inp.value=''; inp.focus(); }
    document.getElementById('gs-results').innerHTML = gsPlaceholder();
  }
}

function createSearchOverlay(){
  var ov = document.createElement('div');
  ov.id = 'search-overlay';
  ov.innerHTML =
    // Top bar
    '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b1)">'
    +'<div style="font-size:20px">🔍</div>'
    +'<input type="text" id="gs-input" placeholder="Пошук по клієнтах, заказах, авто, шинах, складі..." '
    +'style="flex:1;background:transparent;border:none;font-size:16px;color:var(--tx);outline:none;font-family:Arial,sans-serif">'
    +'<button onclick="toggleSearch()" style="background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;padding:0 4px;font-family:Arial,sans-serif">✕</button>'
    +'</div>'
    // Quick filters
    +'<div style="display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--b1);overflow-x:auto">'
    +['Все','Закази','Клієнти','Авто','Шини','Склад'].map(function(lbl,i){
      return '<button class="gs-filter-btn" data-f="'+lbl+'" style="padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(i===0?'var(--acc)':'var(--s2)')+';color:'+(i===0?'#000':'var(--tx3)')+';border:1px solid '+(i===0?'var(--acc)':'var(--b1)')+'">'+lbl+'</button>';
    }).join('')
    +'</div>'
    // Results
    +'<div id="gs-results" style="flex:1;overflow-y:auto;padding:12px 14px">'
    +gsPlaceholder()
    +'</div>';

  document.body.appendChild(ov);
  ov.classList.add('open');

  var inp = document.getElementById('gs-input');
  if(inp){
    inp.focus();
    inp.addEventListener('input', function(){
      var q = this.value.trim();
      var f = (document.querySelector('.gs-filter-btn.gs-active')||{getAttribute:function(){return 'Все';}}).getAttribute('data-f')||'Все';
      if(q.length < 1){
        document.getElementById('gs-results').innerHTML = gsPlaceholder();
        return;
      }
      renderGsResults(q, f);
    });
  }

  // Filter buttons
  ov.querySelectorAll('.gs-filter-btn').forEach(function(btn){
    btn.onclick = function(){
      ov.querySelectorAll('.gs-filter-btn').forEach(function(b){
        b.style.background='var(--s2)'; b.style.color='var(--tx3)'; b.style.borderColor='var(--b1)';
        b.classList.remove('gs-active');
      });
      this.style.background='var(--acc)'; this.style.color='#000'; this.style.borderColor='var(--acc)';
      this.classList.add('gs-active');
      var q = inp ? inp.value.trim() : '';
      if(q) renderGsResults(q, this.getAttribute('data-f'));
    };
  });
  // Mark first as active
  var first = ov.querySelector('.gs-filter-btn');
  if(first) first.classList.add('gs-active');
}

function gsPlaceholder(){
  return '<div style="padding:32px 0;text-align:center;color:var(--tx3)">'
    +'<div style="font-size:40px;margin-bottom:12px">🔍</div>'
    +'<div style="font-size:14px;font-weight:700;margin-bottom:8px">Введіть запит для пошуку</div>'
    +'<div style="font-size:12px;line-height:1.8">Пошук по: клієнтах · заказ-нарядах · номерах авто<br>марках авто · шинах · складі</div>'
    +'</div>';
}

function renderGsResults(q, filter){
  var el = document.getElementById('gs-results');
  if(!el) return;
  var ql = q.toLowerCase();
  var results = [];

  // ── Закази ──
  if(filter==='Все'||filter==='Закази'||filter==='Авто'){
    DB.orders.forEach(function(o){
      var match = false;
      var reasons = [];
      if(o.id.toLowerCase().includes(ql)){ match=true; reasons.push('Номер заказу: '+o.id); }
      if(o.client&&o.client.name.toLowerCase().includes(ql)){ match=true; reasons.push('Клієнт: '+o.client.name); }
      if(o.plate&&o.plate.toLowerCase().includes(ql)){ match=true; reasons.push('Номер авто: '+o.plate); }
      if(o.brand&&o.brand.toLowerCase().includes(ql)){ match=true; reasons.push('Марка: '+o.brand); }
      if(o.model&&o.model.toLowerCase().includes(ql)){ match=true; reasons.push('Модель: '+o.model); }
      if((o.works||[]).some(function(w){ return w.name&&w.name.toLowerCase().includes(ql); })){ match=true; reasons.push('Робота'); }
      if(match) results.push({
        type:'order', icon:'📄',
        title: o.id+' · '+(o.client?o.client.name:'—'),
        sub: (o.plate?o.plate+' · ':'')+o.date+' · '+fmtM(calcT(o.works)),
        badge: ST[o.status]?ST[o.status].l:o.status,
        badgeColor: ST[o.status]?ST[o.status].c:'var(--tx3)',
        reason: reasons[0]||'',
        action: function(id){ return function(){ toggleSearch(); showDetail(id); }; }(o.id)
      });
    });
  }

  // ── Клієнти ──
  if(filter==='Все'||filter==='Клієнти'){
    DB.clients.forEach(function(c){
      var match = false;
      var reasons = [];
      if(c.name.toLowerCase().includes(ql)){ match=true; reasons.push('Ім\'я: '+c.name); }
      if(c.phone&&c.phone.toLowerCase().includes(ql)){ match=true; reasons.push('Телефон: '+c.phone); }
      if(c.company&&c.company.toLowerCase().includes(ql)){ match=true; reasons.push('Фірма: '+c.company); }
      if(match){
        var ords = DB.orders.filter(function(o){ return o.client&&o.client.id===c.id; });
        results.push({
          type:'client', icon:'👤',
          title: c.name,
          sub: (c.phone||'')+(c.company?' · '+c.company:'')+(ords.length?' · '+ords.length+' заказів':''),
          badge: c.debt>0?'Борг '+fmtM(c.debt):'',
          badgeColor:'var(--err)',
          reason: reasons[0]||'',
          action: function(id){ return function(){ toggleSearch(); navTo('clients'); setTimeout(function(){ showClientDetail(id); },100); }; }(c.id)
        });
      }
    });
  }

  // ── Склад ──
  if(filter==='Все'||filter==='Склад'){
    DB.warehouse.forEach(function(w){
      if(w.name.toLowerCase().includes(ql)||w.cat.toLowerCase().includes(ql)){
        results.push({
          type:'warehouse', icon:'📦',
          title: w.name,
          sub: w.cat+' · Залишок: '+w.stock+' '+w.unit+' · ₴'+w.price,
          badge: w.stock<=w.min?'⚠️ Критично':'',
          badgeColor:'var(--err)',
          reason:'Склад',
          action: function(){ toggleSearch(); navTo('warehouse'); }
        });
      }
    });
  }

  // ── Шини ──
  if(filter==='Все'||filter==='Шини'){
    (DB.tires||[]).forEach(function(t){
      var match = false;
      if((t.brand||'').toLowerCase().includes(ql)) match=true;
      if((t.model||'').toLowerCase().includes(ql)) match=true;
      if((t.size||'').toLowerCase().includes(ql))  match=true;
      if((t.location||'').toLowerCase().includes(ql)) match=true;
      var client = t.clientId ? DB.clients.find(function(c){ return c.id===t.clientId; }) : null;
      if(client&&client.name.toLowerCase().includes(ql)) match=true;
      if(match){
        results.push({
          type:'tire', icon:'🛞',
          title: (t.brand||'—')+' '+esc(t.size||''),
          sub: (t.ttype==='new'?'Нова':'Б/у')+' · '+(client?client.name:'Наша')+(t.location?' · '+t.location:''),
          badge: '',badgeColor:'',reason:'Шина',
          action: function(id){ return function(){ toggleSearch(); navTo('tires'); setTimeout(function(){ showTireDetail(id); },100); }; }(String(t.id))
        });
      }
    });
  }

  if(!results.length){
    el.innerHTML = '<div style="padding:32px 0;text-align:center;color:var(--tx3)"><div style="font-size:36px;margin-bottom:10px">😕</div><div style="font-size:14px">Нічого не знайдено за запитом<br><b style="color:var(--tx)">«'+esc(q)+'»</b></div></div>';
    return;
  }

  var h = '<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">Знайдено: <b style="color:var(--tx)">'+results.length+'</b></div>';
  results.forEach(function(r, i){
    h += '<div class="gs-result-item" data-idx="'+i+'" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor=\'var(--acc)\'" onmouseout="this.style.borderColor=\'var(--b1)\'">';
    h += '<div style="font-size:24px;flex-shrink:0">'+r.icon+'</div>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.title)+'</div>';
    h += '<div style="font-size:11px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.sub)+'</div>';
    if(r.reason) h += '<div style="font-size:10px;color:var(--acc);margin-top:2px">'+esc(r.reason)+'</div>';
    h += '</div>';
    if(r.badge) h += '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;color:'+r.badgeColor+';background:'+r.badgeColor+'18;flex-shrink:0">'+esc(r.badge)+'</span>';
    h += '<div style="color:var(--tx3);flex-shrink:0">›</div>';
    h += '</div>';
  });

  el.innerHTML = h;

  // Bind click actions
  el.querySelectorAll('.gs-result-item').forEach(function(item){
    var idx = parseInt(item.getAttribute('data-idx'));
    item.onclick = results[idx].action;
  });
}

      console.log('SW error:', err);

// PWA Install prompt
var _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  _deferredPrompt = e;
  // Show install button in dashboard
  var btn = document.getElementById('pwa-install-btn');
  if(btn) btn.style.display = 'flex';
});

function installPWA(){
  if(!_deferredPrompt) return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(function(result){
    _deferredPrompt = null;
    var btn = document.getElementById('pwa-install-btn');
    if(btn) btn.style.display = 'none';
  });
}
