<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GT Tires Service · Tir Parking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07090c;--s1:#0d1117;--s2:#141920;--b1:#1f2937;--acc:#f0a500;--acc2:#ff6b35;--ok:#23c55e;--err:#ff3f57;--info:#3b82f6;--tx:#e2e8f0;--tx2:#6b7a99;--tx3:#323d55;--nav:62px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:Arial,sans-serif;overflow-x:hidden}
button{cursor:pointer;font-family:Arial,sans-serif;touch-action:manipulation}
input,select,textarea{font-family:Arial,sans-serif;font-size:16px;color:var(--tx);background:var(--s2);border:2px solid var(--b1);border-radius:8px;padding:12px;width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;outline:none}
input:focus,select:focus{border-color:var(--acc)}
label{display:block;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:12px}
#topbar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(10,22,40,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(79,142,247,.2);display:flex;align-items:center;padding:0 8px;z-index:100;gap:5px}
#topbar-title{font-size:16px;font-weight:800;flex:1}
#content{margin-top:48px;margin-bottom:var(--nav);padding:14px;max-width:700px;margin-left:auto;margin-right:auto}
#bottomnav{height:var(--nav);background:var(--s1);border-top:1px solid var(--b1);display:flex;z-index:100}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--tx3);font-size:10px;font-weight:500;padding:6px 0}
.bnav.on{color:var(--acc)}
.bnav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--b1);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;touch-action:manipulation;min-height:44px;font-family:Arial,sans-serif}
.btn-acc{background:var(--acc);color:#000}
.btn-ok{background:rgba(35,197,94,.15);border:1.5px solid rgba(35,197,94,.4);color:var(--ok)}
.btn-sec{background:var(--s2);border:1.5px solid var(--b1);color:var(--tx)}
.btn-ghost{background:transparent;border:1.5px solid var(--b1);color:var(--tx2)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgroup{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:12px}
.fgroup h3{font-size:12px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;margin-top:0}
.wrow{display:grid;grid-template-columns:1fr 56px 80px 30px;gap:6px;align-items:center;margin-bottom:8px}
.wrow input{padding:10px 8px;font-size:14px}
.wsum{font-size:13px;font-weight:700;color:var(--acc);text-align:right;font-family:monospace;white-space:nowrap}
.total-bar{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.action-bar{display:flex;gap:8px;margin-top:14px;padding-bottom:10px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;flex-shrink:0}
.fab{position:fixed;bottom:calc(var(--nav) + 14px);right:16px;width:54px;height:54px;border-radius:50%;background:var(--acc);color:#000;font-size:28px;border:none;box-shadow:0 4px 16px rgba(240,165,0,.4);display:flex;align-items:center;justify-content:center;z-index:90;touch-action:manipulation;cursor:pointer}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px 14px}
.metric .m-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.metric .m-val{font-size:20px;font-weight:900;font-family:monospace}
.empty{padding:40px 20px;text-align:center;color:var(--tx3)}
.empty div:first-child{font-size:40px;margin-bottom:10px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;background:var(--s2)}
.tbl td{padding:10px;border-top:1px solid var(--b1);font-size:13px;vertical-align:middle}

@media print {
  #topbar, #bottomnav, #content, #login-page, .fab { display: none !important; }
  #print-area { display: block !important; }
  body { background: #fff !important; color: #000 !important; padding: 0 !important; margin: 0 !important; }
}
#print-area {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff;
  color: #000;
  font-family: Arial, sans-serif;
  padding: 28px 32px;
  z-index: 9999;
  overflow-y: auto;
}

@media print {
  #topbar,#bottomnav,#content,#login-page,.fab,#print-overlay>div:first-child{display:none!important}
  #print-overlay{position:static!important;overflow:visible!important}
  #print-doc{padding:8px!important;max-width:100%!important}
  body{margin:0!important;padding:0!important}
}

#notif-panel {
  display:none;
  position:fixed;
  top:54px;right:0;
  width:min(340px,100vw);
  max-height:calc(100vh - 54px - var(--nav));
  background:var(--s1);
  border-left:1px solid var(--b1);
  border-bottom:1px solid var(--b1);
  z-index:200;
  overflow-y:auto;
  box-shadow:-4px 4px 24px rgba(0,0,0,.4);
}
#notif-panel.open { display:block; }

#search-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(7,9,12,.96);
  z-index:500;
  flex-direction:column;
}
#search-overlay.open { display:flex; }
</style>
</head>

/* ═══ HELPERS ═══ */
function _today(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function _now(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function _parseDate(s){if(!s)return null;var p=s.split('.');if(p.length<3)return null;return new Date(+p[2],+p[1]-1,+p[0]);}

function fmtM(v){return '₴'+(Number(v)||0).toLocaleString('uk-UA');}
function calcT(works){return (works||[]).reduce(function(s,w){return s+(w.qty||1)*(w.price||0);},0);}
function av(n){return n?String(n)[0].toUpperCase():'?';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function bh(s){var x=ST[s]||{l:s,c:'#6b7a99',b:'rgba(107,122,153,.1)'};return '<span class="badge" style="color:'+x.c+';background:'+x.b+'">'+x.l+'</span>';}

/* ═══ ORDERS LIST ═══ */
var _filter='all';
function renderOrdersList(el){ return pgOrders(el); }
function pgOrders(el){
  var orders=DB.orders;
  var filtered=_filter==='all'?orders:orders.filter(function(o){return o.status===_filter;});
  var h='<div>';
  // Filter tabs
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px">';
  [['all','Всі'],['waiting','Очікують'],['in_progress','В роботі'],['completed','Виконані'],['debt','Борг']].forEach(function(fArr){
    var k=fArr[0],lbl=fArr[1];
    var cnt=k==='all'?orders.length:orders.filter(function(o){return o.status===k;}).length;
    var s=ST[k]||{c:'var(--acc)',b:'rgba(240,165,0,.1)'};
    var on=_filter===k;
    h+='<button class="filter-btn" data-f="'+k+'" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?s.b:'var(--s1)')+';color:'+(on?s.c:'var(--tx3)')+';border:1.5px solid '+(on?s.c:'var(--b1)')+'">'+lbl+' <span style="opacity:.7;font-size:10px">'+cnt+'</span></button>';
  });
  h+='</div>';
  if(!filtered.length){h+='<div class="empty"><div>📄</div><div>Заказів немає</div></div>';}
  else{
    h+='<div class="card">';
    filtered.forEach(function(o){
      h+='<div class="list-item order-row" data-id="'+o.id+'">';
      h+='<div style="font-size:22px">'+(o.vtype==='truck'?'🚛':o.vtype==='tractor'?'🚜':'🚗')+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-size:11px;color:var(--acc);font-weight:700;font-family:monospace">'+o.id+'</span>'+bh(o.status)+'</div>';
      h+='<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.client?o.client.name:'—')+'</div>';
      h+='<div style="font-size:11px;color:var(--tx3)">'+esc(o.brand||'')+' '+esc(o.model||'')+' · '+esc(o.plate||'')+'</div></div>';
      h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(calcT(o.works))+'</div><div style="font-size:10px;color:var(--tx3)">'+o.time+'</div></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
  // Filter buttons
  el.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.onclick=function(){_filter=this.getAttribute('data-f');pgOrders(el);};
  });
  // Order rows
  el.querySelectorAll('.order-row').forEach(function(row){
    row.onclick=function(){showDetail(this.getAttribute('data-id'));};
  });
  // FAB
  var fab=document.createElement('button');
  fab.id='fab';fab.className='fab';fab.textContent='+';
  fab.onclick=pgNewOrder;
  document.body.appendChild(fab);
}

/* ═══ ORDER DETAIL ═══ */
function showDetail(id){
  var o=DB.orders.find(function(x){return x.id===id;});
  if(!o)return;
  rmFab();
  setTitle(o.id);
  var el=document.getElementById('content');
  var tot=calcT(o.works);
  var h='<div>';
  h+='<div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" id="dt-back">← Назад</button></div>';
  h+='<div class="card" style="margin-bottom:12px"><div style="padding:14px 16px">';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="avatar">'+av(o.client?o.client.name:'')+'</div>';
  h+='<div style="flex:1"><div style="font-size:14px;font-weight:800">'+esc(o.client?o.client.name:'—')+'</div><div style="font-size:12px;color:var(--tx3)">'+esc(o.client&&o.client.phone||'')+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:22px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(tot)+'</div>'+bh(o.status)+'</div></div>';
  h+='<div class="row2" style="font-size:12px"><div><span style="color:var(--tx3)">Авто: </span><b>'+esc(o.brand||'')+' '+esc(o.model||'')+'</b></div><div><span style="color:var(--tx3)">Номер: </span><b style="font-family:monospace;color:var(--acc)">'+esc(o.plate||'—')+'</b></div></div>';
  h+='</div></div>';
  h+='<div class="card" style="margin-bottom:12px">';
  h+='<div class="card-head">Виконані роботи</div>';
  (o.works||[]).forEach(function(w){
    h+='<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1)"><div style="flex:1;font-size:13px;font-weight:700">'+esc(w.name)+'</div><div style="font-size:11px;color:var(--tx3);margin:0 10px">×'+w.qty+'</div><div style="font-size:13px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM((w.qty||1)*(w.price||0))+'</div></div>';
  });
  h+='<div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:rgba(240,165,0,.04)"><span style="font-weight:700">Разом:</span><span style="font-size:20px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(tot)+'</span></div>';
  h+='</div>';
  if(o.note)h+='<div style="padding:10px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:12px;font-size:13px;color:var(--tx2)">📝 '+esc(o.note)+'</div>';
  // Status
  h+='<div class="card" style="margin-bottom:12px"><div class="card-head">Статус</div><div style="padding:12px 14px;display:flex;gap:7px;flex-wrap:wrap">';
  Object.keys(ST).forEach(function(k){
    var s=ST[k];
    h+='<button class="st-btn" data-st="'+k+'" style="padding:7px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;background:'+(o.status===k?s.b:'transparent')+';color:'+s.c+';border:1px solid '+(o.status===k?s.c:'var(--b1)')+'">'+s.l+'</button>';
  });
  h+='</div></div>';
  // Photos
  if(o.photos&&o.photos.length){
    h+='<div class="card" style="margin-bottom:12px"><div class="card-head">📷 Фото ('+o.photos.length+')</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:12px">';
    o.photos.forEach(function(src,i){
      h+='<img src="'+src+'" class="order-photo-thumb" style="width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer">';
    });
    h+='</div></div>';
  }
  // Show warehouse deductions if any
  if(o.deductions && o.deductions.length){
    h+='<div class="card" style="margin-bottom:10px"><div class="card-head">📦 Списано зі складу</div>';
    o.deductions.forEach(function(d){
      h+='<div style="display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--b1);font-size:12px">';
      h+='<span>'+esc(d.name)+'</span>';
      h+='<span style="color:var(--err);font-weight:700">-'+d.qty+' '+esc(d.unit)+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<button class="btn btn-ghost btn-full" id="add-photo-btn" style="margin-bottom:8px">📷 Додати фото</button>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  h+='<button class="btn btn-full" style="background:rgba(37,211,102,.15);border:1.5px solid rgba(37,211,102,.4);color:#25d366;font-size:13px;font-weight:700;padding:12px" id="wa-btn">📱 WhatsApp</button>';
  h+='<button class="btn btn-full" style="background:rgba(114,53,201,.15);border:1.5px solid rgba(114,53,201,.4);color:#7735c9;font-size:13px;font-weight:700;padding:12px" id="vb-btn">📲 Viber</button>';
  h+='</div>';
  h+='<button class="btn btn-sec btn-full" id="print-btn">🖨️ Друкувати / PDF</button>';
  h+='</div>';
  el.innerHTML=h;
  document.getElementById('dt-back').onclick=function(){navTo('orders');};
  document.getElementById('print-btn').onclick=function(){printOrder(o);};
  var waBtn=document.getElementById('wa-btn');
  var vbBtn=document.getElementById('vb-btn');
  if(waBtn) waBtn.onclick=function(){shareOrderWhatsApp(o);};
  if(vbBtn) vbBtn.onclick=function(){shareOrderViber(o);};
  document.getElementById('add-photo-btn').onclick=function(){
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.multiple=true;
    inp.onchange=function(){
      var files=this.files;
      if(!files||!files.length)return;
      if(!o.photos) o.photos=[];
      var done=0, total=files.length;
      for(var i=0;i<total;i++){
        (function(file){
          var r=new FileReader();
          r.onload=function(ev){
            o.photos.push(ev.target.result);
            done++;
            if(done===total){ DB.save(); showDetail(id); }
          };
          r.readAsDataURL(file);
        })(files[i]);
      }
    };
    inp.click();
  };
  el.querySelectorAll('.st-btn').forEach(function(btn){
    btn.onclick=function(){
      o.status=this.getAttribute('data-st');
      DB.save();
      showDetail(id);
    };
  });
}

function renderSvcPicker(){

  if(!picker) return;
  var cats = Object.keys(SERVICES);
  var h = '<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px">';
  cats.forEach(function(cat){
    var on = cat===_svcCat;
    h += '<button class="svc-cat-btn" data-cat="'+cat+'" style="padding:5px 11px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?'var(--acc)':'var(--s2)')+';color:'+(on?'#000':'var(--tx2)')+';border:1px solid '+(on?'var(--acc)':'var(--b1)')+'">'+cat+'</button>';
  });
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  SERVICES[_svcCat].forEach(function(svc){
    h += '<button class="svc-item-btn" data-name="'+svc.name+'" data-price="'+svc.price+'" style="padding:9px 10px;border-radius:8px;background:var(--s2);border:1.5px solid var(--b1);cursor:pointer;font-family:Arial,sans-serif;text-align:left;touch-action:manipulation">';
    h += '<div style="font-size:13px;font-weight:700;color:var(--tx)">'+svc.name+'</div>';
    h += '<div style="font-size:12px;color:var(--acc);font-family:monospace;margin-top:2px">'+(svc.price?'₴'+svc.price:'договірна')+'</div>';
    h += '</button>';
  });
  h += '</div>';
  picker.innerHTML = h;

  // Bind category buttons
  picker.querySelectorAll('.svc-cat-btn').forEach(function(btn){
    btn.onclick = function(){
      _svcCat = this.getAttribute('data-cat');
      renderSvcPicker();
    };
  });
  // Bind service items
  picker.querySelectorAll('.svc-item-btn').forEach(function(btn){
    btn.onclick = function(){
      var name  = this.getAttribute('data-name');
      var price = parseFloat(this.getAttribute('data-price'))||0;
      addRowWithData(name, 1, price);

      this.style.background = 'rgba(240,165,0,.15)';

function addRowWithData(name, qty, price){
  var i = _rc++;
  var list = document.getElementById('wlist');
  if(!list) return;
  var row = document.createElement('div');
  row.className = 'wrow'; row.id = 'wr'+i;
  var n = document.createElement('input'); n.type='text'; n.id='wn'+i; n.value=name; n.autocomplete='off';
  var q = document.createElement('input'); q.type='number'; q.id='wq'+i; q.value=qty; q.min='1'; q.style.textAlign='center';
  var p = document.createElement('input'); p.type='number'; p.id='wp'+i; p.value=price||''; p.placeholder='0'; p.min='0'; p.style.textAlign='right';
  var s = document.createElement('div'); s.className='wsum'; s.id='ws'+i; s.textContent='₴'+((qty||1)*(price||0)).toLocaleString('uk-UA');
  var d = document.createElement('button'); d.type='button'; d.textContent='×';
  d.style.cssText='width:28px;height:28px;border-radius:6px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err);cursor:pointer;font-size:17px;padding:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;font-family:Arial,sans-serif';
  d.onclick=(function(idx){return function(){var r=document.getElementById('wr'+idx);if(r)r.remove();updTotal();};})(i);
  q.addEventListener('input',(function(idx){return function(){updRow(idx);};})(i));
  p.addEventListener('input',(function(idx){return function(){updRow(idx);};})(i));
  row.appendChild(n); row.appendChild(q); row.appendChild(p); row.appendChild(s); row.appendChild(d);
  list.appendChild(row);
  updTotal();
}

function saveOrder(oid,num){
  var cn=getVal('f-cn').trim();
  if(!cn){alert("Введіть імʼя клієнта!");var e=document.getElementById('f-cn');if(e)e.focus();return;}
  var works=getWorks();
  if(!works.length){alert('Додайте хоча б одну роботу!');return;}
  var cp=getVal('f-cp').trim(),cc=getVal('f-cc').trim();
  var pl=getVal('f-pl').trim().toUpperCase(),br=getVal('f-br').trim(),mo=getVal('f-mo').trim();
  var vt=getVal('f-vt')||'car',pay=getVal('f-pay')||'cash',mas=getVal('f-mas'),nt=getVal('f-nt').trim();
  var client=null;
  for(var i=0;i<DB.clients.length;i++){if(DB.clients[i].name.toLowerCase()===cn.toLowerCase()){client=DB.clients[i];break;}}
  if(!client){client={id:Date.now(),name:cn,phone:cp,company:cc,type:'regular',debt:0};DB.clients.unshift(client);}
  // Auto-save vehicle
  if(pl){
    var existVeh = (DB.vehicles||[]).find(function(v){ return v.plate===pl && v.clientId===client.id; });
    if(!existVeh){
      if(!DB.vehicles) DB.vehicles=[];
      DB.vehicles.unshift({
        id: Date.now()+1,
        clientId: client.id,
        clientName: cn,
        plate: pl,
        brand: br,
        model: mo,
        vtype: vt,
        addedDate: _today(),
        orders: []
      });
      DB.save();
    }
  }
  var tot=works.reduce(function(s,w){return s+w.qty*w.price;},0);
  var order={id:oid,num:num,date:_today(),time:_now(),client:client,vtype:vt,plate:pl,brand:br,model:mo,works:works,pay:pay,status:pay==='debt'?'debt':'waiting',note:nt,master:mas,photos:photos.slice(),deductions:deductLog};
  DB.orders.unshift(order);

  // ── AUTO WAREHOUSE DEDUCTION ──
  var deductLog = [];
  if(works && works.length){
    works.forEach(function(w){
      if(!w.name) return;
      var wname = w.name.toLowerCase();
      (DB.warehouse||[]).forEach(function(item){
        var iname = item.name.toLowerCase();
        // Match: warehouse item name appears in work name (min 4 chars)
        if(iname.length >= 4 && wname.includes(iname)){
          var deduct = Math.min(w.qty||1, item.stock);
          if(deduct > 0){
            item.stock = Math.max(0, item.stock - deduct);
            if(!item.history) item.history = [];
            item.history.unshift({
              date: _today(),
              action: 'Списання',
              qty: -deduct,
              note: 'Заказ '+oid+' · '+w.name
            });
            deductLog.push({name:item.name, qty:deduct, unit:item.unit||'шт'});
          }
        }
      });
    });
    if(deductLog.length) DB.save();
  }

  // Auto cash entry
  if(pay!=='debt'){
    var cashAmt = pay==='partial'?(parseFloat(getVal('f-pay-cash'))||0):tot;
    if(cashAmt>0){
      if(!DB.cash) DB.cash=[];
      DB.cash.unshift({
        id:Date.now(),type:'income',
        cat:'Заказ',
        desc:'Заказ '+oid+(o.client?' · '+o.client.name:''),
        amount:cashAmt,
        payType:pay,
        date:_today(),time:_now(),
        orderId:oid
      });
    }
  }
  DB.save();
  var msg = '✅ Заказ '+oid+' збережено!\nСума: '+fmtM(tot);
  if(deductLog && deductLog.length){
    msg += '\n\n📦 Списано зі складу:';
    deductLog.forEach(function(d){ msg += '\n• '+d.name+': -'+d.qty+' '+d.unit; });
  }
  alert(msg);
  navTo('orders');
}
function printFromForm(oid){
  var works=getWorks();
  var o={id:oid,date:_today(),time:_now(),client:{name:getVal('f-cn'),phone:getVal('f-cp')},plate:getVal('f-pl').toUpperCase(),brand:getVal('f-br'),model:getVal('f-mo'),vtype:getVal('f-vt')||'car',works:works,pay:getVal('f-pay')||'cash',note:getVal('f-nt'),master:getVal('f-mas')};

}

  h += '<div><label>Продажна ціна ₴</label><input type="number" id="nt-sell" placeholder="0" min="0"></div></div>';

    if(!brand){ alert('Введіть марку шини!'); document.getElementById('nt-brand').focus(); return; }
    if(!size) { alert('Введіть розмір шини!'); document.getElementById('nt-size').focus(); return; }

    var clientId = parseInt((document.getElementById('nt-client')||{value:''}).value)||null;
    var tire = {
      id: Date.now(),
      brand: brand,
      model: (document.getElementById('nt-model')||{value:''}).value.trim(),
      size:  size,
      ttype: (document.getElementById('nt-ttype')||{value:'used'}).value||'used',
      condition: (document.getElementById('nt-cond')||{value:'good'}).value||'good',

      buyPrice: parseFloat((document.getElementById('nt-buy')||{value:''}).value)||null,
      sellPrice: parseFloat((document.getElementById('nt-sell')||{value:''}).value)||null,
      notes: (document.getElementById('nt-notes')||{value:''}).value.trim(),
      addedDate: _today(),
      history: [{action:'added', note:'Додано в базу', date:_today()}]
    };

    DB.tires.unshift(tire);
    DB.save();
    alert('✅ Шину '+brand+' '+size+' збережено!');
    navTo('tires');
  };
}


/* ═══ PRICELIST ═══ */
var _priceCat = null;
var _priceSearch = '';
var _priceEditing = null; // {cat, idx}

function pgPrice(el){
  var cats = Object.keys(SERVICES);
  if(!_priceCat) _priceCat = cats[0];
  var activeCat = _priceCat;

  var h = '<div style="padding-bottom:20px">';

  // Search
  h += '<input type="text" id="price-search" placeholder="🔍 Пошук послуги..." value="'+esc(_priceSearch)+'" style="margin-bottom:12px">';

  if(_priceSearch.trim()){
    var q = _priceSearch.trim().toLowerCase();
    var results = [];
    cats.forEach(function(cat){
      (SERVICES[cat]||[]).forEach(function(s,i){
        if(s.name.toLowerCase().includes(q)) results.push({cat:cat,svc:s,idx:i});
      });
    });
    if(!results.length){
      h += '<div class="empty"><div>🔍</div><div>Нічого не знайдено</div></div>';
    } else {
      h += '<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Знайдено: '+results.length+'</div>';
      h += '<div class="card">';
      results.forEach(function(r){
        h += buildPriceRow(r.svc, r.cat, r.idx, true);
      });
      h += '</div>';
    }
  } else {
    // Category tabs
    h += '<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px">';
    cats.forEach(function(cat){
      var on = cat===activeCat;
      h += '<button class="price-cat-btn" data-cat="'+esc(cat)+'" style="padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?'var(--acc)':'var(--s1)')+';color:'+(on?'#000':'var(--tx3)')+';border:1.5px solid '+(on?'var(--acc)':'var(--b1)')+'">'+esc(cat)+'</button>';
    });
    h += '</div>';

    var svcs = SERVICES[activeCat]||[];
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div style="font-size:12px;color:var(--tx3)">'+svcs.length+' послуг</div>';
    h += '<button class="btn btn-acc btn-sm" id="price-add-btn">+ Послуга</button>';
    h += '</div>';

    h += '<div class="card" id="price-list">';
    if(!svcs.length){
      h += '<div style="padding:20px;text-align:center;color:var(--tx3);font-size:12px">Послуг немає</div>';
    }
    svcs.forEach(function(s,i){
      h += buildPriceRow(s, activeCat, i, false);
    });
    h += '</div>';
  }

  h += '<button class="btn btn-sec btn-full" style="margin-top:12px" id="price-print-btn">🖨️ Роздрукувати прайс-лист</button>';
  h += '</div>';
  el.innerHTML = h;

  // Bind search
  var srch = document.getElementById('price-search');
  if(srch){
    srch.addEventListener('input', function(){
      _priceSearch = this.value;
      _priceEditing = null;
      pgPrice(el);
    });
    // Don't steal focus if already editing
    if(!_priceEditing) srch.focus();
  }

  // Bind category tabs
  el.querySelectorAll('.price-cat-btn').forEach(function(btn){
    btn.onclick = function(){
      _priceCat = this.getAttribute('data-cat');
      _priceSearch = '';
      _priceEditing = null;
      pgPrice(el);
    };
  });

  // Add service
  var addBtn = document.getElementById('price-add-btn');
  if(addBtn) addBtn.onclick = function(){ pgNewService(activeCat); };

  // Print
  var printBtn = document.getElementById('price-print-btn');
  if(printBtn) printBtn.onclick = function(){ printPriceList(); };

  // Bind ALL price action buttons
  bindPriceButtons(el);
}

function buildPriceRow(s, cat, idx, showCat){
  var editing = _priceEditing && _priceEditing.cat===cat && _priceEditing.idx===idx;
  var h = '<div class="price-row" style="border-bottom:1px solid var(--b1)">';

  if(editing){
    // Inline edit form
    h += '<div style="padding:10px 12px;background:rgba(240,165,0,.06)">';
    h += '<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px">✏️ Редагування</div>';
    h += '<input type="text" id="pe-name" value="'+esc(s.name)+'" placeholder="Назва послуги" style="margin-bottom:8px">';
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
    h += '<div style="flex:1"><label style="margin-top:0">Ціна ₴</label><input type="number" id="pe-price" value="'+(s.price||0)+'" min="0" placeholder="0"></div>';
    h += '</div>';
    h += '<div style="display:flex;gap:8px">';
    h += '<button class="btn btn-ok" style="flex:1" id="pe-save-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'">✓ Зберегти</button>';
    h += '<button class="btn btn-ghost" id="pe-cancel-btn">Скасувати</button>';
    h += '</div></div>';
  } else {
    h += '<div style="display:flex;align-items:center;padding:11px 12px">';
    h += '<div style="flex:1;min-width:0">';
    if(showCat) h += '<div style="font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;margin-bottom:2px">'+esc(cat)+'</div>';
    h += '<div style="font-size:13px;font-weight:700;line-height:1.3">'+esc(s.name)+'</div>';
    h += '</div>';
    h += '<div style="font-size:15px;font-weight:900;color:var(--acc);font-family:monospace;flex-shrink:0;margin:0 8px">'+(s.price?fmtM(s.price):'договірна')+'</div>';
    h += '<button class="btn btn-sm price-edit-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'" style="min-height:36px;padding:6px 10px;font-size:14px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);margin-right:4px">✏️</button>';
    h += '<button class="btn btn-sm price-del-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'" style="min-height:36px;padding:6px 10px;font-size:14px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err)">✕</button>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function bindPriceButtons(el){
  // Edit buttons
  el.querySelectorAll('.price-edit-btn').forEach(function(btn){
    btn.onclick = function(){
      _priceEditing = {
        cat: this.getAttribute('data-cat'),
        idx: parseInt(this.getAttribute('data-idx'))
      };
      pgPrice(el);
    };
  });

  // Delete buttons
  el.querySelectorAll('.price-del-btn').forEach(function(btn){
    btn.onclick = function(){
      var cat = this.getAttribute('data-cat');
      var idx = parseInt(this.getAttribute('data-idx'));
      var svc = SERVICES[cat] && SERVICES[cat][idx];
      if(!svc) return;
      // Inline confirm via UI
      showConfirmDelete(el, cat, idx, svc.name);
    };
  });

  // Save edit
  var saveBtn = document.getElementById('pe-save-btn');

function pgSalary(el){
  var workers = DB.workers||[];
  var orders  = DB.orders||[];
  var now = new Date();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();

  // Parse date
  var parseDate=_parseDate;

  // Get orders this month
  var mStart = new Date(curYear, curMonth, 1);
  var mEnd   = new Date(curYear, curMonth+1, 0, 23,59,59);
  var monthOrders = orders.filter(function(o){
    var d=parseDate(o.date); return d&&d>=mStart&&d<=mEnd;
  });

  // Calc salary per worker
  function calcWorkerSalary(w){
    if(w.type==='fixed') return w.base||0;
    // percent from orders where master matches worker name
    var workerOrders = monthOrders.filter(function(o){
      return o.master && (
        o.master===w.name ||
        (typeof o.master==='object' && o.master.name===w.name)
      );
    });
    var rev = workerOrders.reduce(function(s,o){ return s+calcT(o.works); },0);
    var base = w.base||0;
    var pct  = rev * ((w.percent||0)/100);
    return base + pct;
  }

  var totalSalary = workers.filter(function(w){ return w.active; }).reduce(function(s,w){ return s+calcWorkerSalary(w); },0);

  var mNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

  var h='<div style="padding-bottom:20px">';

  // Header

  h+='<div style="font-size:24px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(totalSalary)+'</div></div>';
  h+='</div>';

  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-acc btn-sm" id="sal-add-btn">+ Майстер</button></div>';

  // Workers list
  workers.forEach(function(w){
    if(!w.active) return;
    var sal = calcWorkerSalary(w);
    var wOrders = monthOrders.filter(function(o){
      return o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name));

      wOrders.slice(0,5).forEach(function(o){

        h+='<span style="font-size:11px;color:var(--tx3);margin-left:8px">'+(o.client?esc(o.client.name):'—')+'</span></div>';
        h+='<span style="font-size:12px;font-weight:700;color:var(--acc);font-family:monospace">'+fmtM(calcT(o.works))+'</span>';

/* ═══ FINANCE ═══ */
function pgFinance(el){
  var orders = DB.orders;
  var now = new Date();
  var todayStr = _today();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();

  // Helper: parse date string dd.mm.yyyy
  var parseDate=_parseDate;

  // Filter by period
  function ordersIn(from, to){
    return orders.filter(function(o){
      var d = parseDate(o.date);
      if(!d) return false;
      return d >= from && d <= to;
    });
  }

  var todayStart = new Date(curYear, curMonth, now.getDate());
  var monthStart = new Date(curYear, curMonth, 1);
  var yearStart  = new Date(curYear, 0, 1);
  var todayEnd   = new Date(curYear, curMonth, now.getDate(), 23, 59, 59);

  var todayOrders = ordersIn(todayStart, todayEnd);
  var monthOrders = ordersIn(monthStart, new Date());
  var yearOrders  = ordersIn(yearStart,  new Date());

  function rev(arr){ return arr.reduce(function(s,o){ return s+calcT(o.works); },0); }
  function cnt(arr){ return arr.length; }
  function paid(arr){ return arr.filter(function(o){ return o.status==='completed'; }).length; }
  function debtAmt(arr){ return arr.filter(function(o){ return o.status==='debt'; }).reduce(function(s,o){ return s+calcT(o.works); },0); }

  var revToday = rev(todayOrders);
  var revMonth = rev(monthOrders);
  var revYear  = rev(yearOrders);

  var totalDebt = DB.clients.reduce(function(s,c){ return s+(c.debt||0); },0);

  // Monthly breakdown (last 6 months)
  var months = [];
  for(var i=5; i>=0; i--){
    var d = new Date(curYear, curMonth-i, 1);
    var mStart = new Date(d.getFullYear(), d.getMonth(), 1);
    var mEnd   = new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59);
    var mOrders = ordersIn(mStart, mEnd);
    var mNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    months.push({
      label: mNames[d.getMonth()]+' '+d.getFullYear(),
      rev: rev(mOrders),
      cnt: mOrders.length
    });
  }

  var maxRev = months.reduce(function(m,x){ return Math.max(m,x.rev); },1);

  // Top services

/* ═══ NOTIFICATIONS ═══ */
var NOTIFS = [];

function loadNotifs(){
  try{ var s=localStorage.getItem('gt_notifs'); if(s) NOTIFS=JSON.parse(s); }catch(e){}
  autoGenNotifs();
}
function saveNotifs(){
  try{ localStorage.setItem('gt_notifs',JSON.stringify(NOTIFS)); }catch(e){}
}

function autoGenNotifs(){
  // Auto-generate system notifications based on data
  var auto = [];

  // 1. Critical warehouse stock
  (DB.warehouse||[]).forEach(function(w){
    if(w.stock<=w.min){
      auto.push({
        id:'wh_'+w.id, type:'stock', priority:'high',
        title:'⚠️ Критичний залишок',
        text:w.name+': '+w.stock+' '+w.unit+' (мін: '+w.min+')',
        date:_today(), read:false, auto:true
      });
    }
  });

  // 2. Client debts
  (DB.clients||[]).forEach(function(c){
    if(c.debt>0){
      auto.push({
        id:'debt_'+c.id, type:'debt', priority:'high',
        title:'💰 Борг клієнта',
        text:c.name+': '+fmtM(c.debt),
        date:_today(), read:false, auto:true
      });
    }
  });

  // 3. Orders waiting >1 day
  (DB.orders||[]).filter(function(o){ return o.status==='waiting'; }).forEach(function(o){
    auto.push({
      id:'wait_'+o.id, type:'order', priority:'medium',
      title:'🕐 Заказ очікує',
      text:o.id+' · '+(o.client?o.client.name:'')+(o.plate?' · '+o.plate:''),
      date:o.date, read:false, auto:true
    });
  });

  // Merge auto notifs — don't duplicate
  var existingIds = NOTIFS.map(function(n){ return n.id; });
  auto.forEach(function(n){
    if(!existingIds.includes(n.id)){
      NOTIFS.unshift(n);
    } else {
      // Update text
      var idx = NOTIFS.findIndex(function(x){ return x.id===n.id; });
      if(idx>=0){ NOTIFS[idx].text=n.text; NOTIFS[idx].title=n.title; }
    }
  });

  // Remove auto notifs that no longer apply
  NOTIFS = NOTIFS.filter(function(n){
    if(!n.auto) return true;
    return auto.some(function(a){ return a.id===n.id; });
  });

  updateBadge();
  saveNotifs();
}

function updateBadge(){
  var unread = NOTIFS.filter(function(n){ return !n.read; }).length;
  var badge = document.getElementById('notif-badge');
  if(badge){
    badge.textContent = unread > 9 ? '9+' : String(unread);
    badge.style.display = unread > 0 ? 'flex' : 'none';
  }
}

function toggleNotifPanel(){
  var panel = document.getElementById('notif-panel');
  if(!panel){
    createNotifPanel();
    return;
  }
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
  } else {
    renderNotifPanel();
    panel.classList.add('open');
    // Mark all as read
    NOTIFS.forEach(function(n){ n.read=true; });
    saveNotifs();
    updateBadge();
  }
}

function createNotifPanel(){
  var panel = document.createElement('div');
  panel.id = 'notif-panel';
  document.body.appendChild(panel);
  renderNotifPanel();
  panel.classList.add('open');
  NOTIFS.forEach(function(n){ n.read=true; });
  saveNotifs();
  updateBadge();
}

      }
      h += '</div>';
    });

    h += '<div style="padding:12px 16px">';

  panel.innerHTML = h;

  if(clearBtn) clearBtn.onclick = function(){

    if(!panel.contains(e.target) && !bell.contains(e.target)){
      panel.classList.remove('open');
    }
  }
});

function showReport(id, autoPrint){

  ov.innerHTML =

function repHeader(title){

  var mNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

    +'<div style="font-size:10px;color:#555;letter-spacing:.1em">Велика Димарка · +38 068 259 01 96</div></div>'
    +'<div style="text-align:right"><div style="font-size:18px;font-weight:900">'+title+'</div>'
    +'<div style="font-size:11px;color:#555">'+mNames[now.getMonth()]+' '+now.getFullYear()+' · '+_today()+'</div></div>'

function buildReport(id){
  var now = new Date();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();
  var parseDate=_parseDate;
  var mStart = new Date(curYear,curMonth,1);
  var mEnd   = new Date(curYear,curMonth+1,0,23,59,59);
  function inMonth(o){ var d=parseDate(o.date); return d&&d>=mStart&&d<=mEnd; }

  if(id==='orders-month'){
    var orders = DB.orders.filter(inMonth);
    var tot = orders.reduce(function(s,o){ return s+calcT(o.works); },0);
    var rows = orders.map(function(o,i){
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:11px;font-family:monospace;font-weight:700;color:#f0a500">'+o.id+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(o.client?o.client.name:'—')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px;font-family:monospace">'+esc(o.plate||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+o.date+' '+o.time+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(o.works||[]).map(function(w){return esc(w.name)+' ×'+w.qty;}).join(', ')+'</td>'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700;text-align:right;font-family:monospace">'+fmtM(calcT(o.works))+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(ST[o.status]?'<span style="color:'+ST[o.status].c+'">'+ST[o.status].l+'</span>':o.status)+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Звіт по заказах')
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
      +[['Заказів',orders.length],['Виконано',orders.filter(function(o){return o.status==='completed';}).length],['Виручка',fmtM(tot)],['Боргів',fmtM(orders.filter(function(o){return o.status==='debt';}).reduce(function(s,o){return s+calcT(o.works);},0))]].map(function(k){
        return '<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:10px;text-align:center"><div style="font-size:16px;font-weight:900">'+k[1]+'</div><div style="font-size:9px;color:#888;text-transform:uppercase;margin-top:2px">'+k[0]+'</div></div>';
      }).join('')+'</div>'
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">№</th><th style="padding:6px 8px;text-align:left;font-size:10px">Клієнт</th><th style="padding:6px 8px;text-align:left;font-size:10px">Номер авто</th><th style="padding:6px 8px;text-align:left;font-size:10px">Дата</th><th style="padding:6px 8px;text-align:left;font-size:10px">Роботи</th><th style="padding:6px 8px;text-align:right;font-size:10px">Сума</th><th style="padding:6px 8px;text-align:left;font-size:10px">Статус</th></tr></thead><tbody>'+rows+'</tbody>'
      +'<tfoot><tr style="background:#f0a500"><td colspan="5" style="padding:8px;font-weight:900;font-size:13px">ЗАГАЛЬНА ВИРУЧКА:</td><td style="padding:8px;font-weight:900;font-size:14px;text-align:right;font-family:monospace">'+fmtM(tot)+'</td><td></td></tr></tfoot></table>';
  }

  if(id==='revenue'){
    var orders2 = DB.orders;
    var tot2 = orders2.reduce(function(s,o){ return s+calcT(o.works); },0);
    var paid2 = orders2.filter(function(o){ return o.status==='completed'; }).reduce(function(s,o){ return s+calcT(o.works); },0);
    var debt2 = DB.clients.reduce(function(s,c){ return s+(c.debt||0); },0);
    var payMap = {cash:0,card:0,partial:0,debt:0};
    orders2.forEach(function(o){ payMap[o.pay||'cash']+= calcT(o.works); });
    var payLabels = {cash:'💵 Готівка',card:'💳 Картка',partial:'🔀 Часткова',debt:'📋 Борг'};
    return repHeader('Звіт по виручці')
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +[['Загальна виручка',fmtM(tot2)],['Оплачено',fmtM(paid2)],['Борги',fmtM(debt2)]].map(function(k){
        return '<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:18px;font-weight:900">'+k[1]+'</div><div style="font-size:9px;color:#888;text-transform:uppercase;margin-top:3px">'+k[0]+'</div></div>';
      }).join('')+'</div>'
      +'<table style="width:100%;border-collapse:collapse;margin-bottom:16px"><thead><tr style="background:#f0a500"><th style="padding:6px 10px;text-align:left;font-size:10px">Спосіб оплати</th><th style="padding:6px 10px;text-align:right;font-size:10px">Сума</th></tr></thead><tbody>'
      +Object.keys(payMap).map(function(k,i){ return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'"><td style="padding:7px 10px;font-size:13px">'+payLabels[k]+'</td><td style="padding:7px 10px;text-align:right;font-weight:700;font-family:monospace;font-size:13px">'+fmtM(payMap[k])+'</td></tr>'; }).join('')
      +'</tbody></table>';
  }

  if(id==='clients'){
    var rows3 = DB.clients.map(function(c,i){
      var ords = DB.orders.filter(function(o){ return o.client&&o.client.id===c.id; });
      var rev  = ords.reduce(function(s,o){ return s+calcT(o.works); },0);
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(c.name)+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(c.phone||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(c.company||'')+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:12px">'+ords.length+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:700;font-family:monospace">'+fmtM(rev)+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-weight:700;font-family:monospace;color:'+(c.debt>0?'red':'green')+'">'+fmtM(c.debt)+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Звіт по клієнтах')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">Клієнт</th><th style="padding:6px 8px;text-align:left;font-size:10px">Телефон</th><th style="padding:6px 8px;text-align:left;font-size:10px">Фірма</th><th style="padding:6px 8px;text-align:center;font-size:10px">Заказів</th><th style="padding:6px 8px;text-align:right;font-size:10px">Оборот</th><th style="padding:6px 8px;text-align:right;font-size:10px">Борг</th></tr></thead><tbody>'+rows3+'</tbody></table>';
  }

  if(id==='warehouse'){
    var rows4 = DB.warehouse.map(function(w,i){
      var low = w.stock<=w.min;
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(w.name)+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(w.cat)+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:13px;font-weight:900;color:'+(low?'red':'#000')+'">'+w.stock+' '+esc(w.unit)+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:11px;color:#888">'+w.min+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-family:monospace">₴'+w.price+'</td>'
        +'<td style="padding:6px 8px;text-align:center;font-size:11px;font-weight:700;color:'+(low?'red':'green')+'">'+(low?'⚠️ КРИТИЧНО':'✓ ОК')+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Залишки складу')
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">Позиція</th><th style="padding:6px 8px;text-align:left;font-size:10px">Категорія</th><th style="padding:6px 8px;text-align:center;font-size:10px">Залишок</th><th style="padding:6px 8px;text-align:center;font-size:10px">Мін.</th><th style="padding:6px 8px;text-align:right;font-size:10px">Ціна</th><th style="padding:6px 8px;text-align:center;font-size:10px">Статус</th></tr></thead><tbody>'+rows4+'</tbody></table>';
  }

  if(id==='salary'){
    var workers = DB.workers||[];
    function calcWS(w){
      if(w.type==='fixed') return w.base||0;
      var wOrds = DB.orders.filter(function(o){ return inMonth(o)&&o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name)); });
      var rev = wOrds.reduce(function(s,o){ return s+calcT(o.works); },0);
      return (w.base||0)+rev*((w.percent||0)/100);
    }
    var rows5 = workers.map(function(w,i){
      var wOrds = DB.orders.filter(function(o){ return inMonth(o)&&o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name)); });
      var rev   = wOrds.reduce(function(s,o){ return s+calcT(o.works); },0);
      var sal   = calcWS(w);
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:7px 10px;font-size:13px;font-weight:700">'+esc(w.name)+'</td>'

        +'<td style="padding:7px 10px;text-align:center;font-size:12px">'+(w.type==='percent'?w.percent+'%':'Фікс.')+'</td>'
        +'<td style="padding:7px 10px;text-align:center;font-size:12px">'+wOrds.length+'</td>'

      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:7px 10px;text-align:left;font-size:10px">Майстер</th><th style="padding:7px 10px;text-align:left;font-size:10px">Посада</th><th style="padding:7px 10px;text-align:center;font-size:10px">Тип ЗП</th><th style="padding:7px 10px;text-align:center;font-size:10px">Заказів</th><th style="padding:7px 10px;text-align:right;font-size:10px">Виручка</th><th style="padding:7px 10px;text-align:right;font-size:10px">До виплати</th><th style="padding:7px 10px;text-align:center;font-size:10px">Підпис</th></tr></thead><tbody>'+rows5+'</tbody>'
      +'<tfoot><tr style="background:#f0a500"><td colspan="5" style="padding:8px 10px;font-weight:900;font-size:13px">ЗАГАЛЬНИЙ ФОНД:</td><td style="padding:8px 10px;font-weight:900;font-size:14px;text-align:right;font-family:monospace">'+fmtM(totalSal)+'</td><td></td></tr></tfoot></table>';
  }

  if(id==='services'){
    var cats = Object.keys(SERVICES);
    var rows6 = '';
    cats.forEach(function(cat){
      rows6 += '<tr style="background:#f0a500"><td colspan="2" style="padding:8px 10px;font-size:13px;font-weight:900">'+esc(cat)+'</td></tr>';
      (SERVICES[cat]||[]).forEach(function(s,i){
        rows6 += '<tr style="background:'+(i%2?'#fafafa':'#fff')+'"><td style="padding:7px 10px;font-size:12px">'+esc(s.name)+'</td><td style="padding:7px 10px;text-align:right;font-size:13px;font-weight:700;font-family:monospace;white-space:nowrap">'+(s.price?'₴'+s.price.toLocaleString('uk-UA'):'договірна')+'</td></tr>';
      });
    });
    return repHeader('Прайс-лист послуг')
      +'<table style="width:100%;border-collapse:collapse">'+rows6+'</table>';
  }

  if(id==='tires'){
    var rows7 = (DB.tires||[]).map(function(t,i){
      var c = t.clientId ? DB.clients.find(function(x){ return x.id===t.clientId; }) : null;
      var condLabel = {new:'Нова',good:'Хороша',worn:'Зношена',damaged:'Пошкоджена'}[t.condition]||t.condition||'—';
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700">'+esc(t.brand||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:12px;font-family:monospace;font-weight:700">'+esc(t.size||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(t.ttype==='new'?'Нова':'Б/у')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+condLabel+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(c?esc(c.name):'Наша')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(t.location||'—')+'</td>'
        +'<td style="padding:6px 8px;text-align:right;font-size:12px;font-family:monospace">'+(t.sellPrice?fmtM(t.sellPrice):'—')+'</td>'
        +'</tr>';

  }
  return '<div style="padding:40px;text-align:center;color:#999">Звіт не знайдено</div>';
}

  }
}

      return '<button class="gs-filter-btn" data-f="'+lbl+'" style="padding:4px 12px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(i===0?'var(--acc)':'var(--s2)')+';color:'+(i===0?'#000':'var(--tx3)')+';border:1px solid '+(i===0?'var(--acc)':'var(--b1)')+'">'+lbl+'</button>';
    }).join('')
    +'</div>'
    // Results
    +'<div id="gs-results" style="flex:1;overflow-y:auto;padding:12px 14px">'
    +gsPlaceholder()
    +'</div>';

  document.body.appendChild(ov);
  ov.classList.add('open');

  var inp = document.getElementById('gs-input');
  if(inp){
    inp.focus();
    inp.addEventListener('input', function(){
      var q = this.value.trim();
      var f = (document.querySelector('.gs-filter-btn.gs-active')||{getAttribute:function(){return 'Все';}}).getAttribute('data-f')||'Все';
      if(q.length < 1){
        document.getElementById('gs-results').innerHTML = gsPlaceholder();
        return;
      }
      renderGsResults(q, f);
    });
  }

  // Filter buttons
  ov.querySelectorAll('.gs-filter-btn').forEach(function(btn){
    btn.onclick = function(){
      ov.querySelectorAll('.gs-filter-btn').forEach(function(b){
        b.style.background='var(--s2)'; b.style.color='var(--tx3)'; b.style.borderColor='var(--b1)';
        b.classList.remove('gs-active');
      });
      this.style.background='var(--acc)'; this.style.color='#000'; this.style.borderColor='var(--acc)';
      this.classList.add('gs-active');
      var q = inp ? inp.value.trim() : '';
      if(q) renderGsResults(q, this.getAttribute('data-f'));
    };
  });
  // Mark first as active
  var first = ov.querySelector('.gs-filter-btn');
  if(first) first.classList.add('gs-active');
}

function gsPlaceholder(){

    +'</div>';

function renderGsResults(q, filter){
  var el = document.getElementById('gs-results');
  if(!el) return;
  var ql = q.toLowerCase();
  var results = [];

  // ── Закази ──
  if(filter==='Все'||filter==='Закази'||filter==='Авто'){
    DB.orders.forEach(function(o){
      var match = false;
      var reasons = [];
      if(o.id.toLowerCase().includes(ql)){ match=true; reasons.push('Номер заказу: '+o.id); }
      if(o.client&&o.client.name.toLowerCase().includes(ql)){ match=true; reasons.push('Клієнт: '+o.client.name); }
      if(o.plate&&o.plate.toLowerCase().includes(ql)){ match=true; reasons.push('Номер авто: '+o.plate); }
      if(o.brand&&o.brand.toLowerCase().includes(ql)){ match=true; reasons.push('Марка: '+o.brand); }
      if(o.model&&o.model.toLowerCase().includes(ql)){ match=true; reasons.push('Модель: '+o.model); }
      if((o.works||[]).some(function(w){ return w.name&&w.name.toLowerCase().includes(ql); })){ match=true; reasons.push('Робота'); }
      if(match) results.push({
        type:'order', icon:'📄',
        title: o.id+' · '+(o.client?o.client.name:'—'),
        sub: (o.plate?o.plate+' · ':'')+o.date+' · '+fmtM(calcT(o.works)),
        badge: ST[o.status]?ST[o.status].l:o.status,
        badgeColor: ST[o.status]?ST[o.status].c:'var(--tx3)',
        reason: reasons[0]||'',
        action: function(id){ return function(){ toggleSearch(); showDetail(id); }; }(o.id)
      });
    });
  }

  // ── Клієнти ──
  if(filter==='Все'||filter==='Клієнти'){
    DB.clients.forEach(function(c){
      var match = false;
      var reasons = [];
      if(c.name.toLowerCase().includes(ql)){ match=true; reasons.push('Ім\'я: '+c.name); }
      if(c.phone&&c.phone.toLowerCase().includes(ql)){ match=true; reasons.push('Телефон: '+c.phone); }
      if(c.company&&c.company.toLowerCase().includes(ql)){ match=true; reasons.push('Фірма: '+c.company); }
      if(match){
        var ords = DB.orders.filter(function(o){ return o.client&&o.client.id===c.id; });
        results.push({
          type:'client', icon:'👤',
          title: c.name,
          sub: (c.phone||'')+(c.company?' · '+c.company:'')+(ords.length?' · '+ords.length+' заказів':''),
          badge: c.debt>0?'Борг '+fmtM(c.debt):'',
          badgeColor:'var(--err)',
          reason: reasons[0]||'',
          action: function(id){ return function(){ toggleSearch(); navTo('clients'); setTimeout(function(){ showClientDetail(id); },100); }; }(c.id)
        });
      }
    });
  }

  // ── Склад ──
  if(filter==='Все'||filter==='Склад'){
    DB.warehouse.forEach(function(w){
      if(w.name.toLowerCase().includes(ql)||w.cat.toLowerCase().includes(ql)){
        results.push({
          type:'warehouse', icon:'📦',
          title: w.name,
          sub: w.cat+' · Залишок: '+w.stock+' '+w.unit+' · ₴'+w.price,
          badge: w.stock<=w.min?'⚠️ Критично':'',
          badgeColor:'var(--err)',
          reason:'Склад',
          action: function(){ toggleSearch(); navTo('warehouse'); }
        });
      }
    });
  }

  // ── Шини ──
  if(filter==='Все'||filter==='Шини'){
    (DB.tires||[]).forEach(function(t){
      var match = false;
      if((t.brand||'').toLowerCase().includes(ql)) match=true;
      if((t.model||'').toLowerCase().includes(ql)) match=true;
      if((t.size||'').toLowerCase().includes(ql))  match=true;
      if((t.location||'').toLowerCase().includes(ql)) match=true;
      var client = t.clientId ? DB.clients.find(function(c){ return c.id===t.clientId; }) : null;
      if(client&&client.name.toLowerCase().includes(ql)) match=true;
      if(match){
        results.push({
          type:'tire', icon:'🛞',
          title: (t.brand||'—')+' '+esc(t.size||''),
          sub: (t.ttype==='new'?'Нова':'Б/у')+' · '+(client?client.name:'Наша')+(t.location?' · '+t.location:''),
          badge: '',badgeColor:'',reason:'Шина',
          action: function(id){ return function(){ toggleSearch(); navTo('tires'); setTimeout(function(){ showTireDetail(id); },100); }; }(String(t.id))
        });
      }
    });
  }

  if(!results.length){
    el.innerHTML = '<div style="padding:32px 0;text-align:center;color:var(--tx3)"><div style="font-size:36px;margin-bottom:10px">😕</div><div style="font-size:14px">Нічого не знайдено за запитом<br><b style="color:var(--tx)">«'+esc(q)+'»</b></div></div>';
    return;
  }

  var h = '<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">Знайдено: <b style="color:var(--tx)">'+results.length+'</b></div>';
  results.forEach(function(r, i){
    h += '<div class="gs-result-item" data-idx="'+i+'" style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor=\'var(--acc)\'" onmouseout="this.style.borderColor=\'var(--b1)\'">';
    h += '<div style="font-size:24px;flex-shrink:0">'+r.icon+'</div>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.title)+'</div>';
    h += '<div style="font-size:11px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.sub)+'</div>';
    if(r.reason) h += '<div style="font-size:10px;color:var(--acc);margin-top:2px">'+esc(r.reason)+'</div>';
    h += '</div>';
    if(r.badge) h += '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;color:'+r.badgeColor+';background:'+r.badgeColor+'18;flex-shrink:0">'+esc(r.badge)+'</span>';
    h += '<div style="color:var(--tx3);flex-shrink:0">›</div>';
    h += '</div>';
  });

  el.innerHTML = h;

  // Bind click actions
  el.querySelectorAll('.gs-result-item').forEach(function(item){
    var idx = parseInt(item.getAttribute('data-idx'));
    item.onclick = results[idx].action;
  });
}

// Add photo to existing order
function addPhotoToOrder(oid){
  var o = DB.orders.find(function(x){ return x.id===oid; });
  if(!o) return;
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = function(){
    var files = this.files;
    if(!files||!files.length) return;
    if(!o.photos) o.photos = [];
    var done = 0;
    for(var i=0;i<files.length;i++){
      (function(file){
        var r = new FileReader();
        r.onload = function(e){
          o.photos.push(e.target.result);
          done++;
          if(done===files.length){
            DB.save();
            showDetail(oid);
          }
        };
        r.readAsDataURL(file);
      })(files[i]);
    }
  };
  inp.click();
}

/* ═══ CASH ═══ */
function pgCash(el){
  var entries = DB.cash||[];
  var now = new Date();
  var todayStr = _today();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();

  function parseD(s){if(!s)return null;var p=s.split('.');if(p.length<3)return null;return new Date(+p[2],+p[1]-1,+p[0]);}
  var mStart = new Date(curYear,curMonth,1);

  var todayEnt  = entries.filter(function(e){return e.date===todayStr;});
  var monthEnt  = entries.filter(function(e){var d=parseD(e.date);return d&&d>=mStart;});

  function sum(arr,type){ return arr.filter(function(e){return !type||e.type===type;}).reduce(function(s,e){return s+e.amount;},0); }

  var balanceAll  = sum(entries,'income') - sum(entries,'expense');
  var incomeToday = sum(todayEnt,'income');
  var expToday    = sum(todayEnt,'expense');
  var incomeMonth = sum(monthEnt,'income');
  var expMonth    = sum(monthEnt,'expense');

  // Period filter
  var period = window._cashPeriod||'month';

  var filtered = period==='today' ? todayEnt
               : period==='month' ? monthEnt
               : entries;

  var h='<div style="padding-bottom:20px">';

  // Balance card
  h+='<div style="background:linear-gradient(135deg,rgba(240,165,0,.15),rgba(35,197,94,.08));border:1.5px solid rgba(240,165,0,.25);border-radius:14px;padding:16px;margin-bottom:14px">';
  h+='<div style="font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Баланс каси</div>';
  h+='<div style="font-size:34px;font-weight:900;color:'+(balanceAll>=0?'var(--ok)':'var(--err)')+';font-family:monospace">'+fmtM(balanceAll)+'</div>';
  h+='<div style="display:flex;gap:16px;margin-top:10px">';
  h+='<div><div style="font-size:10px;color:var(--tx3)">Прихід сьогодні</div><div style="font-size:14px;font-weight:700;color:var(--ok);font-family:monospace">+'+fmtM(incomeToday)+'</div></div>';
  h+='<div><div style="font-size:10px;color:var(--tx3)">Витрати сьогодні</div><div style="font-size:14px;font-weight:700;color:var(--err);font-family:monospace">-'+fmtM(expToday)+'</div></div>';
  h+='</div></div>';

  // Month stats
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';
  h+='<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:13px">';
  h+='<div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">Прихід / міс</div>';
  h+='<div style="font-size:20px;font-weight:900;color:var(--ok);font-family:monospace">'+fmtM(incomeMonth)+'</div></div>';
  h+='<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:13px">';
  h+='<div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">Витрати / міс</div>';
  h+='<div style="font-size:20px;font-weight:900;color:var(--err);font-family:monospace">'+fmtM(expMonth)+'</div></div>';
  h+='</div>';

  // Add buttons
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h+='<button class="btn btn-ok btn-full" id="cash-income-btn">+ Прихід</button>';
  h+='<button class="btn btn-danger btn-full" id="cash-expense-btn">− Витрата</button>';
  h+='</div>';

  // Period filter
  h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  ['today','month','all'].forEach(function(p){
    var lbls={today:'Сьогодні',month:'Місяць',all:'Всі'};
    var on=p===period;
    h+='<button class="cash-period-btn" data-p="'+p+'" style="padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?'var(--acc)':'var(--s1)')+';color:'+(on?'#000':'var(--tx3)')+';border:1.5px solid '+(on?'var(--acc)':'var(--b1)')+'">'+lbls[p]+'</button>';
  });
  h+='</div>';

  // Entries list
  if(!filtered.length){
    h+='<div class="empty"><div>💳</div><div>Записів немає</div></div>';
  } else {
    h+='<div class="card">';
    filtered.forEach(function(e){
      var isIn = e.type==='income';
      var catIcons = {Заказ:'📄',Зарплата:'👨‍🔧',Матеріали:'📦',Оренда:'🏠',Паливо:'⛽',Інше:'💰'};
      h+='<div style="display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--b1)">';
      h+='<div style="width:36px;height:36px;border-radius:50%;background:'+(isIn?'rgba(35,197,94,.12)':'rgba(255,63,87,.12)')+';display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+(catIcons[e.cat]||'💰')+'</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.desc||e.cat)+'</div>';
      h+='<div style="font-size:10px;color:var(--tx3)">'+e.date+(e.time?' · '+e.time:'')+(e.payType?' · '+({cash:'Готівка',card:'Безнал',partial:'Часткова'}[e.payType]||e.payType):'')+'</div>';
      h+='</div>';
      h+='<div style="font-size:15px;font-weight:900;color:'+(isIn?'var(--ok)':'var(--err)')+';font-family:monospace;flex-shrink:0">'+(isIn?'+':'-')+fmtM(e.amount)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;

  // Period buttons
  el.querySelectorAll('.cash-period-btn').forEach(function(btn){
    btn.onclick=function(){window._cashPeriod=this.getAttribute('data-p');pgCash(el);};
  });

  // Add income/expense
  document.getElementById('cash-income-btn').onclick=function(){showCashForm(el,'income');};
  document.getElementById('cash-expense-btn').onclick=function(){showCashForm(el,'expense');};
}

function showCashForm(el, type){
  var isIn = type==='income';
  setTitle(isIn?'Прихід':'Витрата');
  var cats = isIn
    ? ['Заказ','Передоплата','Позика','Інше']
    : ['Зарплата','Матеріали','Оренда','Паливо','Комунальні','Ремонт','Інше'];

  var h='<div><div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" id="cf-back">← Каса</button></div>';
  h+='<div class="fgroup"><h3>'+(isIn?'💚 Прихід':'🔴 Витрата')+'</h3>';
  h+='<label>Сума ₴ *</label><input type="number" id="cf-amount" placeholder="0" min="0" style="font-size:24px;font-weight:900;text-align:center;font-family:monospace">';
  h+='<label>Категорія</label><select id="cf-cat">';
  cats.forEach(function(c){h+='<option>'+c+'</option>';});
  h+='</select>';
  h+='<label>Опис</label><input type="text" id="cf-desc" placeholder="Деталі..." autocomplete="off">';
  if(isIn){
    h+='<label>Тип оплати</label><select id="cf-pay"><option value="cash">💵 Готівка</option><option value="card">💳 Безнал</option></select>';
  }
  h+='</div>';
  h+='<div class="action-bar"><button class="btn btn-ghost" id="cf-cancel">Скасувати</button><button class="btn '+(isIn?'btn-ok':'btn-danger')+'" style="flex:1" id="cf-save">'+(isIn?'✓ Додати прихід':'✓ Додати витрату')+'</button></div>';
  h+='</div>';
  el.innerHTML=h;

  document.getElementById('cf-back').onclick=function(){pgCash(el);};
  document.getElementById('cf-cancel').onclick=function(){pgCash(el);};
  document.getElementById('cf-save').onclick=function(){
    var amount=parseFloat((document.getElementById('cf-amount')||{value:''}).value)||0;
    if(!amount){alert('Введіть суму!');document.getElementById('cf-amount').focus();return;}
    var cat=(document.getElementById('cf-cat')||{value:'Інше'}).value;
    var desc=(document.getElementById('cf-desc')||{value:''}).value.trim()||cat;
    var payType=isIn?((document.getElementById('cf-pay')||{value:'cash'}).value):'';
    if(!DB.cash) DB.cash=[];
    DB.cash.unshift({id:Date.now(),type:type,cat:cat,desc:desc,amount:amount,payType:payType,date:_today(),time:_now()});
    DB.save();
    pgCash(el);
  };
}

var SB_URL = 'https://qdinuhhfkueusgmqxfvg.supabase.co';

var _syncEnabled = false;
var _syncPending = false;
var _lastSync = null;

function sbFetch(path, method, body){
  var url = SB_URL + '/rest/v1/' + path;
  var opts = {
    method: method||'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'resolution=merge-duplicates':'return=minimal'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  return fetch(url, opts);
}

function syncToSupabase(){
  if(!_syncEnabled) return;
  if(_syncPending) return;
  _syncPending = true;
  updateSyncStatus('syncing');
  
  var tables = [
    {name:'gt_orders',   data:DB.orders,   idKey:'id'},
    {name:'gt_clients',  data:DB.clients,  idKey:'id'},
    {name:'gt_warehouse',data:DB.warehouse,idKey:'id'},
    {name:'gt_tires',    data:(DB.tires||[]),   idKey:'id'},
    {name:'gt_workers',  data:(DB.workers||[]), idKey:'id'},
    {name:'gt_cash',     data:(DB.cash||[]),    idKey:'id'},
    {name:'gt_vehicles', data:(DB.vehicles||[]),idKey:'id'}
  ];
  
  var promises = tables.map(function(t){
    if(!t.data||!t.data.length) return Promise.resolve();
    var rows = t.data.map(function(item){
      return {id: item.id, data: item};
    });
    return sbFetch(t.name+'?on_conflict=id', 'POST', rows)
      .then(function(r){ 
        if(!r.ok) return r.text().then(function(txt){ console.warn(t.name, txt); });
      })
      .catch(function(e){ console.warn('Sync error:', t.name, e.message); });
  });
  
  Promise.all(promises).then(function(){
    _syncPending = false;
    _lastSync = new Date();
    updateSyncStatus('ok');
  }).catch(function(){
    _syncPending = false;
    updateSyncStatus('error');
  });
}

function loadFromSupabase(){
  if(!_syncEnabled) return;
  updateSyncStatus('syncing');
  
  var tables = [
    {name:'gt_orders',   key:'orders'},
    {name:'gt_clients',  key:'clients'},
    {name:'gt_warehouse',key:'warehouse'},
    {name:'gt_tires',    key:'tires'},
    {name:'gt_workers',  key:'workers'},
    {name:'gt_cash',     key:'cash'},
    {name:'gt_vehicles', key:'vehicles'}
  ];
  
  var promises = tables.map(function(t){
    return sbFetch(t.name+'?select=data&order=data->>id.desc', 'GET')
      .then(function(r){ return r.json(); })
      .then(function(rows){
        if(Array.isArray(rows) && rows.length > 0){
          DB[t.key] = rows.map(function(r){ return r.data; });
          DB.save();
        }
      })
      .catch(function(e){ console.warn('Load error:', t.name, e.message); });
  });
  
  Promise.all(promises).then(function(){
    updateSyncStatus('ok');
    navTo(_page||'dashboard');
  });
}

function updateSyncStatus(status){
  var btn = document.getElementById('sync-btn');
  if(!btn) return;
  var icons = {syncing:'🔄', ok:'☁️', error:'⚠️', off:'💾'};
  btn.textContent = icons[status]||'☁️';
  btn.title = status==='ok'?'Синхронізовано з хмарою':status==='syncing'?'Синхронізація...':status==='error'?'Помилка синхронізації':'Локальний режим';
}

function toggleSync(){
  _syncEnabled = !_syncEnabled;
  localStorage.setItem('gt_sync_enabled', _syncEnabled?'1':'0');
  if(_syncEnabled){
    loadFromSupabase();
  } else {
    updateSyncStatus('off');
    alert(_syncEnabled?'☁️ Хмарна синхронізація увімкнена!':'💾 Локальний режим. Дані зберігаються тільки на телефоні.');
  }
  updateSyncStatus(_syncEnabled?'ok':'off');
}

// Auto-sync on DB save
var _origSave = DB.save.bind(DB);
DB.save = function(){
  _origSave();
  if(_syncEnabled) setTimeout(syncToSupabase, 500);
};

// Init
window.addEventListener('load', function(){
  _syncEnabled = localStorage.getItem('gt_sync_enabled')==='1';
  updateSyncStatus(_syncEnabled?'ok':'off');
});
