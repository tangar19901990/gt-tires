<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GT Tires Service · Tir Parking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07090c;--s1:#0d1117;--s2:#141920;--b1:#1f2937;--acc:#f0a500;--acc2:#ff6b35;--ok:#23c55e;--err:#ff3f57;--info:#3b82f6;--tx:#e2e8f0;--tx2:#6b7a99;--tx3:#323d55;--nav:62px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:Arial,sans-serif;overflow-x:hidden}
button{cursor:pointer;font-family:Arial,sans-serif;touch-action:manipulation}
input,select,textarea{font-family:Arial,sans-serif;font-size:16px;color:var(--tx);background:var(--s2);border:2px solid var(--b1);border-radius:8px;padding:12px;width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;outline:none}
input:focus,select:focus{border-color:var(--acc)}
label{display:block;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:12px}
#topbar{position:fixed;top:0;left:0;right:0;height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;z-index:100;gap:10px}
#topbar-title{font-size:16px;font-weight:800;flex:1}
#content{margin-top:54px;margin-bottom:var(--nav);padding:14px;max-width:700px;margin-left:auto;margin-right:auto}
#bottomnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--s1);border-top:1px solid var(--b1);display:flex;z-index:100}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--tx3);font-size:10px;font-weight:500;padding:6px 0}
.bnav.on{color:var(--acc)}
.bnav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid var(--b1);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;touch-action:manipulation;min-height:44px;font-family:Arial,sans-serif}
.btn-acc{background:var(--acc);color:#000}
.btn-ok{background:rgba(35,197,94,.15);border:1.5px solid rgba(35,197,94,.4);color:var(--ok)}
.btn-sec{background:var(--s2);border:1.5px solid var(--b1);color:var(--tx)}
.btn-ghost{background:transparent;border:1.5px solid var(--b1);color:var(--tx2)}
.btn-full{width:100%}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgroup{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:12px}
.fgroup h3{font-size:12px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;margin-top:0}
.wrow{display:grid;grid-template-columns:1fr 56px 80px 30px;gap:6px;align-items:center;margin-bottom:8px}
.wrow input{padding:10px 8px;font-size:14px}
.wsum{font-size:13px;font-weight:700;color:var(--acc);text-align:right;font-family:monospace;white-space:nowrap}
.total-bar{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.action-bar{display:flex;gap:8px;margin-top:14px;padding-bottom:10px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000;flex-shrink:0}
.fab{position:fixed;bottom:calc(var(--nav) + 14px);right:16px;width:54px;height:54px;border-radius:50%;background:var(--acc);color:#000;font-size:28px;border:none;box-shadow:0 4px 16px rgba(240,165,0,.4);display:flex;align-items:center;justify-content:center;z-index:90;touch-action:manipulation;cursor:pointer}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px 14px}
.metric .m-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.metric .m-val{font-size:20px;font-weight:900;font-family:monospace}
.empty{padding:40px 20px;text-align:center;color:var(--tx3)}
.empty div:first-child{font-size:40px;margin-bottom:10px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;background:var(--s2)}
.tbl td{padding:10px;border-top:1px solid var(--b1);font-size:13px;vertical-align:middle}

@media print {
  #topbar, #bottomnav, #content, #login-page, .fab { display: none !important; }
  #print-area { display: block !important; }
  body { background: #fff !important; color: #000 !important; padding: 0 !important; margin: 0 !important; }
}
#print-area {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff;
  color: #000;
  font-family: Arial, sans-serif;
  padding: 28px 32px;
  z-index: 9999;
  overflow-y: auto;
}

@media print {
  #topbar,#bottomnav,#content,#login-page,.fab,#print-overlay>div:first-child{display:none!important}
  #print-overlay{position:static!important;overflow:visible!important}
  #print-doc{padding:8px!important;max-width:100%!important}
  body{margin:0!important;padding:0!important}
}

#notif-panel {
  display:none;
  position:fixed;
  top:54px;right:0;
  width:min(340px,100vw);
  max-height:calc(100vh - 54px - var(--nav));
  background:var(--s1);
  border-left:1px solid var(--b1);
  border-bottom:1px solid var(--b1);
  z-index:200;
  overflow-y:auto;
  box-shadow:-4px 4px 24px rgba(0,0,0,.4);
}
#notif-panel.open { display:block; }

#search-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(7,9,12,.96);
  z-index:500;
  flex-direction:column;
}
#search-overlay.open { display:flex; }
</style>
</head>

/* ═══ HELPERS ═══ */
function _today(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function _now(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fmtM(v){return '₴'+(Number(v)||0).toLocaleString('uk-UA');}
function calcT(works){return (works||[]).reduce(function(s,w){return s+(w.qty||1)*(w.price||0);},0);}
function av(n){return n?String(n)[0].toUpperCase():'?';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var ST={waiting:{l:'Очікування',c:'#3b82f6',b:'rgba(59,130,246,.1)'},in_progress:{l:'В роботі',c:'#f0a500',b:'rgba(240,165,0,.1)'},completed:{l:'Виконано',c:'#23c55e',b:'rgba(35,197,94,.1)'},debt:{l:'Борг',c:'#ff6b35',b:'rgba(255,107,53,.1)'},cancelled:{l:'Скасовано',c:'#ff3f57',b:'rgba(255,63,87,.1)'}};
function bh(s){var x=ST[s]||{l:s,c:'#6b7a99',b:'rgba(107,122,153,.1)'};return '<span class="badge" style="color:'+x.c+';background:'+x.b+'">'+x.l+'</span>';}
function setTitle(t){
  var sub=document.getElementById('page-subtitle');
  if(sub)sub.textContent=t!=='GT Tires ERP'?t:'';
}
function getEl(id){return document.getElementById(id)||{value:'',textContent:''};}
function getVal(id){return (document.getElementById(id)||{value:''}).value;}

  var tod=_today();
  var now=new Date();
  var mNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
  var dNames=['Неділя','Понеділок','Вівторок','Середа','Четвер','Пятниця','Субота'];

  // Calc stats
  function parseD(s){if(!s)return null;var p=s.split('.');if(p.length<3)return null;return new Date(+p[2],+p[1]-1,+p[0]);}
  var mStart=new Date(now.getFullYear(),now.getMonth(),1);
  var todayOrders=DB.orders.filter(function(o){return o.date===tod;});
  var monthOrders=DB.orders.filter(function(o){var d=parseD(o.date);return d&&d>=mStart;});
  var waitOrders =DB.orders.filter(function(o){return o.status==='waiting';});
  var inProg     =DB.orders.filter(function(o){return o.status==='in_progress';});
  var revToday   =todayOrders.filter(function(o){return o.status==='completed';}).reduce(function(s,o){return s+calcT(o.works);},0);
  var revMonth   =monthOrders.reduce(function(s,o){return s+calcT(o.works);},0);
  var totalDebt  =DB.clients.reduce(function(s,c){return s+(c.debt||0);},0);
  var critWH     =DB.warehouse.filter(function(w){return w.stock<=w.min;});
  var totalClients=DB.clients.length;
  var totalOrders =DB.orders.length;

  // Last 7 days bar chart
  var days7=[];
  for(var i=6;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth(),now.getDate()-i);
    var ds=String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();

  h+='</div></div>';

  // ── ACTIVE ORDERS BANNER ──
  if(inProg.length||waitOrders.length){
    h+='<div style="background:linear-gradient(135deg,rgba(240,165,0,.12),rgba(255,107,53,.08));border:1.5px solid rgba(240,165,0,.25);border-radius:14px;padding:14px 16px;margin-bottom:14px">';

      else if(lbl.includes('Склад')) navTo('warehouse');
    };
  });
}

/* ═══ ORDERS LIST ═══ */
var _filter='all';
function pgOrders(el){
  var orders=DB.orders;
  var filtered=_filter==='all'?orders:orders.filter(function(o){return o.status===_filter;});
  var h='<div>';
  // Filter tabs
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px">';
  [['all','Всі'],['waiting','Очікують'],['in_progress','В роботі'],['completed','Виконані'],['debt','Борг']].forEach(function(fArr){
    var k=fArr[0],lbl=fArr[1];
    var cnt=k==='all'?orders.length:orders.filter(function(o){return o.status===k;}).length;
    var s=ST[k]||{c:'var(--acc)',b:'rgba(240,165,0,.1)'};
    var on=_filter===k;
    h+='<button class="filter-btn" data-f="'+k+'" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?s.b:'var(--s1)')+';color:'+(on?s.c:'var(--tx3)')+';border:1.5px solid '+(on?s.c:'var(--b1)')+'">'+lbl+' <span style="opacity:.7;font-size:10px">'+cnt+'</span></button>';
  });
  h+='</div>';
  if(!filtered.length){h+='<div class="empty"><div>📄</div><div>Заказів немає</div></div>';}
  else{
    h+='<div class="card">';
    filtered.forEach(function(o){
      h+='<div class="list-item order-row" data-id="'+o.id+'">';
      h+='<div style="font-size:22px">'+(o.vtype==='truck'?'🚛':o.vtype==='tractor'?'🚜':'🚗')+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-size:11px;color:var(--acc);font-weight:700;font-family:monospace">'+o.id+'</span>'+bh(o.status)+'</div>';
      h+='<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.client?o.client.name:'—')+'</div>';
      h+='<div style="font-size:11px;color:var(--tx3)">'+esc(o.brand||'')+' '+esc(o.model||'')+' · '+esc(o.plate||'')+'</div></div>';
      h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(calcT(o.works))+'</div><div style="font-size:10px;color:var(--tx3)">'+o.time+'</div></div>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
  // Filter buttons
  el.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.onclick=function(){_filter=this.getAttribute('data-f');pgOrders(el);};
  });
  // Order rows
  el.querySelectorAll('.order-row').forEach(function(row){
    row.onclick=function(){showDetail(this.getAttribute('data-id'));};
  });
  // FAB
  var fab=document.createElement('button');
  fab.id='fab';fab.className='fab';fab.textContent='+';
  fab.onclick=pgNewOrder;
  document.body.appendChild(fab);
}

/* ═══ ORDER DETAIL ═══ */
function showDetail(id){
  var o=DB.orders.find(function(x){return x.id===id;});
  if(!o)return;
  rmFab();
  setTitle(o.id);
  var el=document.getElementById('content');
  var tot=calcT(o.works);
  var h='<div>';
  h+='<div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" id="dt-back">← Назад</button></div>';
  h+='<div class="card" style="margin-bottom:12px"><div style="padding:14px 16px">';
  h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="avatar">'+av(o.client?o.client.name:'')+'</div>';
  h+='<div style="flex:1"><div style="font-size:14px;font-weight:800">'+esc(o.client?o.client.name:'—')+'</div><div style="font-size:12px;color:var(--tx3)">'+esc(o.client&&o.client.phone||'')+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:22px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(tot)+'</div>'+bh(o.status)+'</div></div>';
  h+='<div class="row2" style="font-size:12px"><div><span style="color:var(--tx3)">Авто: </span><b>'+esc(o.brand||'')+' '+esc(o.model||'')+'</b></div><div><span style="color:var(--tx3)">Номер: </span><b style="font-family:monospace;color:var(--acc)">'+esc(o.plate||'—')+'</b></div></div>';
  h+='</div></div>';
  h+='<div class="card" style="margin-bottom:12px">';
  h+='<div class="card-head">Виконані роботи</div>';
  (o.works||[]).forEach(function(w){
    h+='<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1)"><div style="flex:1;font-size:13px;font-weight:700">'+esc(w.name)+'</div><div style="font-size:11px;color:var(--tx3);margin:0 10px">×'+w.qty+'</div><div style="font-size:13px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM((w.qty||1)*(w.price||0))+'</div></div>';
  });
  h+='<div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:rgba(240,165,0,.04)"><span style="font-weight:700">Разом:</span><span style="font-size:20px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(tot)+'</span></div>';
  h+='</div>';
  if(o.note)h+='<div style="padding:10px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:12px;font-size:13px;color:var(--tx2)">📝 '+esc(o.note)+'</div>';
  // Status
  h+='<div class="card" style="margin-bottom:12px"><div class="card-head">Статус</div><div style="padding:12px 14px;display:flex;gap:7px;flex-wrap:wrap">';
  Object.keys(ST).forEach(function(k){
    var s=ST[k];
    h+='<button class="st-btn" data-st="'+k+'" style="padding:7px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;background:'+(o.status===k?s.b:'transparent')+';color:'+s.c+';border:1px solid '+(o.status===k?s.c:'var(--b1)')+'">'+s.l+'</button>';
  });
  h+='</div></div>';
  h+='<button class="btn btn-sec btn-full" id="print-btn">🖨️ Друкувати / PDF</button>';
  h+='</div>';
  el.innerHTML=h;
  document.getElementById('dt-back').onclick=function(){navTo('orders');};
  document.getElementById('print-btn').onclick=function(){printOrder(o);};
  el.querySelectorAll('.st-btn').forEach(function(btn){
    btn.onclick=function(){
      o.status=this.getAttribute('data-st');
      DB.save();
      showDetail(id);
    };
  });
}

var _svcCat = 'Легкове';

function renderSvcPicker(){
  var picker = document.getElementById('svc-picker');
  if(!picker) return;
  var cats = Object.keys(SERVICES);
  var h = '<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px">';
  cats.forEach(function(cat){
    var on = cat===_svcCat;
    h += '<button class="svc-cat-btn" data-cat="'+cat+'" style="padding:5px 11px;border-radius:16px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?'var(--acc)':'var(--s2)')+';color:'+(on?'#000':'var(--tx2)')+';border:1px solid '+(on?'var(--acc)':'var(--b1)')+'">'+cat+'</button>';
  });
  h += '</div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  SERVICES[_svcCat].forEach(function(svc){
    h += '<button class="svc-item-btn" data-name="'+svc.name+'" data-price="'+svc.price+'" style="padding:9px 10px;border-radius:8px;background:var(--s2);border:1.5px solid var(--b1);cursor:pointer;font-family:Arial,sans-serif;text-align:left;touch-action:manipulation">';
    h += '<div style="font-size:13px;font-weight:700;color:var(--tx)">'+svc.name+'</div>';
    h += '<div style="font-size:12px;color:var(--acc);font-family:monospace;margin-top:2px">'+(svc.price?'₴'+svc.price:'договірна')+'</div>';
    h += '</button>';
  });
  h += '</div>';
  picker.innerHTML = h;

  // Bind category buttons
  picker.querySelectorAll('.svc-cat-btn').forEach(function(btn){
    btn.onclick = function(){
      _svcCat = this.getAttribute('data-cat');
      renderSvcPicker();
    };
  });
  // Bind service items
  picker.querySelectorAll('.svc-item-btn').forEach(function(btn){
    btn.onclick = function(){
      var name  = this.getAttribute('data-name');
      var price = parseFloat(this.getAttribute('data-price'))||0;
      addRowWithData(name, 1, price);
      // Visual feedback
      this.style.background = 'rgba(240,165,0,.15)';
      this.style.borderColor = 'var(--acc)';
      var self = this;
      setTimeout(function(){ self.style.background='var(--s2)'; self.style.borderColor='var(--b1)'; }, 600);
    };
  });
}

function addRowWithData(name, qty, price){
  var i = _rc++;
  var list = document.getElementById('wlist');
  if(!list) return;
  var row = document.createElement('div');
  row.className = 'wrow'; row.id = 'wr'+i;
  var n = document.createElement('input'); n.type='text'; n.id='wn'+i; n.value=name; n.autocomplete='off';
  var q = document.createElement('input'); q.type='number'; q.id='wq'+i; q.value=qty; q.min='1'; q.style.textAlign='center';
  var p = document.createElement('input'); p.type='number'; p.id='wp'+i; p.value=price||''; p.placeholder='0'; p.min='0'; p.style.textAlign='right';
  var s = document.createElement('div'); s.className='wsum'; s.id='ws'+i; s.textContent='₴'+((qty||1)*(price||0)).toLocaleString('uk-UA');
  var d = document.createElement('button'); d.type='button'; d.textContent='×';
  d.style.cssText='width:28px;height:28px;border-radius:6px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err);cursor:pointer;font-size:17px;padding:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation;font-family:Arial,sans-serif';
  d.onclick=(function(idx){return function(){var r=document.getElementById('wr'+idx);if(r)r.remove();updTotal();};})(i);
  q.addEventListener('input',(function(idx){return function(){updRow(idx);};})(i));
  p.addEventListener('input',(function(idx){return function(){updRow(idx);};})(i));
  row.appendChild(n); row.appendChild(q); row.appendChild(p); row.appendChild(s); row.appendChild(d);
  list.appendChild(row);
  updTotal();
}

function addRow(){
  addRowWithData('',1,0);
  // focus last name input
  var list=document.getElementById('wlist');
  if(!list)return;
  var rows=list.querySelectorAll('.wrow');
  if(rows.length){
    var last=rows[rows.length-1];
    var i=parseInt(last.id.replace('wr',''));
    var n=document.getElementById('wn'+i);
    if(n)n.focus();
  }
}

function updRow(i){
  var q=parseFloat((document.getElementById('wq'+i)||{value:'1'}).value)||1;
  var p=parseFloat((document.getElementById('wp'+i)||{value:'0'}).value)||0;
  var s=document.getElementById('ws'+i);
  if(s)s.textContent='₴'+(q*p).toLocaleString('uk-UA');
  updTotal();
}
function updTotal(){
  var list=document.getElementById('wlist');if(!list)return;
  var tot=0;
  list.querySelectorAll('.wrow').forEach(function(row){
    var i=parseInt(row.id.replace('wr',''));
    var q=parseFloat((document.getElementById('wq'+i)||{value:'1'}).value)||1;
    var p=parseFloat((document.getElementById('wp'+i)||{value:'0'}).value)||0;
    tot+=q*p;
  });
  var el=document.getElementById('f-tot');if(el)el.textContent='₴'+tot.toLocaleString('uk-UA');
}
function getWorks(){
  var list=document.getElementById('wlist');if(!list)return[];
  var works=[];
  list.querySelectorAll('.wrow').forEach(function(row){
    var i=parseInt(row.id.replace('wr',''));
    var ne=document.getElementById('wn'+i);
    var name=ne?ne.value.trim():'';
    if(!name)return;
    var q=parseFloat((document.getElementById('wq'+i)||{value:'1'}).value)||1;
    var p=parseFloat((document.getElementById('wp'+i)||{value:'0'}).value)||0;
    works.push({name:name,qty:q,price:p});
  });
  return works;
}
function saveOrder(oid,num){
  var cn=getVal('f-cn').trim();
  if(!cn){alert("Введіть імʼя клієнта!");var e=document.getElementById('f-cn');if(e)e.focus();return;}
  var works=getWorks();
  if(!works.length){alert('Додайте хоча б одну роботу!');return;}
  var cp=getVal('f-cp').trim(),cc=getVal('f-cc').trim();
  var pl=getVal('f-pl').trim().toUpperCase(),br=getVal('f-br').trim(),mo=getVal('f-mo').trim();
  var vt=getVal('f-vt')||'car',pay=getVal('f-pay')||'cash',mas=getVal('f-mas'),nt=getVal('f-nt').trim();
  var client=null;
  for(var i=0;i<DB.clients.length;i++){if(DB.clients[i].name.toLowerCase()===cn.toLowerCase()){client=DB.clients[i];break;}}
  if(!client){client={id:Date.now(),name:cn,phone:cp,company:cc,type:'regular',debt:0};DB.clients.unshift(client);}
  var tot=works.reduce(function(s,w){return s+w.qty*w.price;},0);
  var order={id:oid,num:num,date:_today(),time:_now(),client:client,vtype:vt,plate:pl,brand:br,model:mo,works:works,pay:pay,status:pay==='debt'?'debt':'waiting',note:nt,master:mas};
  DB.orders.unshift(order);
  DB.save();
  alert('✅ Заказ '+oid+' збережено!\nСума: '+fmtM(tot));
  navTo('orders');
}
function printFromForm(oid){
  var works=getWorks();
  var o={id:oid,date:_today(),time:_now(),client:{name:getVal('f-cn'),phone:getVal('f-cp')},plate:getVal('f-pl').toUpperCase(),brand:getVal('f-br'),model:getVal('f-mo'),vtype:getVal('f-vt')||'car',works:works,pay:getVal('f-pay')||'cash',note:getVal('f-nt'),master:getVal('f-mas')};
  printOrder(o);
}

/* ═══ WAREHOUSE ═══ */
function pgWarehouse(el){
  var wh = DB.warehouse;
  var crit = wh.filter(function(w){ return w.stock<=w.min; });
  var h = '<div>';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h += '<div style="font-size:12px;color:var(--tx3)">Позицій: <b style="color:var(--tx)">'+wh.length+'</b></div>';
  h += '<button class="btn btn-acc btn-sm" id="wh-add">+ Позиція</button>';
  h += '</div>';

  if(crit.length){
    h += '<div style="background:rgba(255,63,87,.06);border:1px solid rgba(255,63,87,.2);border-radius:10px;padding:11px 13px;margin-bottom:10px">';
    h += '<div style="font-size:11px;font-weight:800;color:var(--err);margin-bottom:5px">⚠️ Критично — поповнити</div>';
    h += crit.map(function(w){ return '<span style="font-size:12px;color:var(--err);font-weight:700;margin-right:8px">'+esc(w.name)+': '+w.stock+'/'+w.min+'</span>'; }).join('');
    h += '</div>';
  }

  h += '<div class="card">';
  wh.forEach(function(w){
    var low = w.stock<=w.min;
    // Check if editing this row
    var editing = window._whEditing === w.id;
    if(editing){
      h += '<div style="padding:12px 14px;border-bottom:1px solid var(--b1);background:rgba(240,165,0,.05)">';
      h += '<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px">✏️ Змінити кількість: <b>'+esc(w.name)+'</b></div>';
      h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
      h += '<button class="btn wh-q-btn" data-id="'+w.id+'" data-d="-10" style="min-height:44px;padding:0 14px;font-size:18px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err)">−10</button>';
      h += '<button class="btn wh-q-btn" data-id="'+w.id+'" data-d="-1"  style="min-height:44px;padding:0 14px;font-size:18px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err)">−1</button>';
      h += '<div style="flex:1;text-align:center;font-size:24px;font-weight:900;font-family:monospace;color:'+(low?'var(--err)':'var(--acc)')+'">'+w.stock+'</div>';
      h += '<button class="btn wh-q-btn" data-id="'+w.id+'" data-d="+1"  style="min-height:44px;padding:0 14px;font-size:18px;background:rgba(35,197,94,.1);border:1px solid rgba(35,197,94,.3);color:var(--ok)">+1</button>';
      h += '<button class="btn wh-q-btn" data-id="'+w.id+'" data-d="+10" style="min-height:44px;padding:0 14px;font-size:18px;background:rgba(35,197,94,.1);border:1px solid rgba(35,197,94,.3);color:var(--ok)">+10</button>';
      h += '</div>';
      h += '<div style="display:flex;gap:8px">';
      h += '<button class="btn btn-ok" style="flex:1" id="wh-save-'+w.id+'">✓ Зберегти</button>';
      h += '<button class="btn btn-ghost" id="wh-cancel-'+w.id+'">Скасувати</button>';
      h += '<button class="btn btn-danger btn-sm" id="wh-del-'+w.id+'">🗑️</button>';
      h += '</div></div>';
    } else {
      h += '<div style="display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--b1)">';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:13px;font-weight:700">'+esc(w.name)+'</div>';
      h += '<div style="font-size:10px;color:var(--tx3)">'+esc(w.cat)+' · ₴'+w.price+'/'+esc(w.unit)+'</div>';
      h += '</div>';
      h += '<div style="text-align:center;margin:0 12px">';
      h += '<div style="font-size:20px;font-weight:900;font-family:monospace;color:'+(low?'var(--err)':'var(--tx)')+'">'+w.stock+'</div>';
      h += '<div style="font-size:9px;color:var(--tx3)">мін: '+w.min+'</div>';
      h += '</div>';
      h += '<button class="btn btn-sm wh-edit" data-id="'+w.id+'" style="min-height:40px;padding:6px 12px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:13px">✏️</button>';
      h += '</div>';
    }
  });

  if(!wh.length){
    h += '<div style="padding:24px;text-align:center;color:var(--tx3);font-size:13px">Склад порожній. Натисни "+ Позиція"</div>';
  }
  h += '</div></div>';
  el.innerHTML = h;

  // ── Bind buttons ──
  document.getElementById('wh-add').onclick = pgNewWarehouse;

  // Edit (open inline panel)
  el.querySelectorAll('.wh-edit').forEach(function(btn){
    btn.onclick = function(){
      window._whEditing = parseInt(this.getAttribute('data-id'));
      pgWarehouse(el);
    };
  });

  // +/- quick buttons
  el.querySelectorAll('.wh-q-btn').forEach(function(btn){
    btn.onclick = function(){
      var id = parseInt(this.getAttribute('data-id'));
      var d  = parseInt(this.getAttribute('data-d'));
      var item = DB.warehouse.find(function(x){ return x.id===id; });
      if(!item) return;
      item.stock = Math.max(0, item.stock + d);
      DB.save();
      pgWarehouse(el);
    };
  });

  // Save edit
  wh.forEach(function(w){
    var saveBtn   = document.getElementById('wh-save-'+w.id);
    var cancelBtn = document.getElementById('wh-cancel-'+w.id);
    var delBtn    = document.getElementById('wh-del-'+w.id);
    if(saveBtn) saveBtn.onclick = function(){
      window._whEditing = null;
      DB.save();
      pgWarehouse(el);
    };
    if(cancelBtn) cancelBtn.onclick = function(){
      window._whEditing = null;
      pgWarehouse(el);
    };
    if(delBtn) delBtn.onclick = function(){
      var bar = document.createElement('div');
      bar.style.cssText = 'position:fixed;bottom:calc(var(--nav)+10px);left:50%;transform:translateX(-50%);background:#1a2130;border:1.5px solid var(--err);border-radius:12px;padding:14px 16px;z-index:999;max-width:340px;width:calc(100% - 32px);box-shadow:0 8px 24px rgba(0,0,0,.4)';
      bar.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:10px">Видалити "<span style="color:var(--err)">'+esc(w.name)+'</span>"?</div>'
        +'<div style="display:flex;gap:8px">'
        +'<button id="wdel-yes" style="flex:1;padding:11px;border-radius:8px;background:rgba(255,63,87,.15);border:1.5px solid rgba(255,63,87,.4);color:var(--err);font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">Так, видалити</button>'
        +'<button id="wdel-no"  style="flex:1;padding:11px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">Скасувати</button>'
        +'</div>';
      document.body.appendChild(bar);
      document.getElementById('wdel-yes').onclick = function(){
        bar.remove();
        DB.warehouse = DB.warehouse.filter(function(x){ return x.id!==w.id; });
        window._whEditing = null;
        DB.save();
        pgWarehouse(el);
      };
      document.getElementById('wdel-no').onclick = function(){ bar.remove(); };
    };
  });
}

  if(f==='company') filtered = tires.filter(function(t){ return t.owner==='company'; });
  if(f==='new')     filtered = tires.filter(function(t){ return t.ttype==='new'; });
  if(f==='used')    filtered = tires.filter(function(t){ return t.ttype==='used'; });

  } else {
    h += '<div class="card">';
    filtered.forEach(function(t){
      var client = t.clientId ? DB.clients.find(function(c){ return c.id===t.clientId; }) : null;
      var condColor = t.condition==='new'?'var(--ok)':t.condition==='good'?'var(--acc)':t.condition==='worn'?'var(--err)':'var(--tx3)';

      h += '</div></div>';

function showTireDetail(id){
  var t = (DB.tires||[]).find(function(x){ return String(x.id)===String(id); });
  if(!t) return;
  var client = t.clientId ? DB.clients.find(function(c){ return c.id===t.clientId; }) : null;
  var el = document.getElementById('content');
  setTitle(t.brand+' '+t.size);

  var condColor = t.condition==='new'?'var(--ok)':t.condition==='good'?'var(--acc)':t.condition==='worn'?'var(--err)':'var(--tx3)';
  var condLabel = {new:'Нова',good:'Хороша',worn:'Зношена',damaged:'Пошкоджена'}[t.condition]||t.condition||'—';

  var h = '<div>';
  h += '<div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" id="tire-back">← Назад</button></div>';

  // Main info card
  h += '<div class="card" style="margin-bottom:12px"><div style="padding:16px">';
  h += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">';
  h += '<div style="font-size:48px">🛞</div>';
  h += '<div style="flex:1">';
  h += '<div style="font-size:18px;font-weight:900">'+esc(t.brand||'—')+' '+esc(t.model||'')+'</div>';
  h += '<div style="font-size:16px;font-weight:700;color:var(--acc);font-family:monospace">'+esc(t.size||'—')+'</div>';
  h += '<div style="margin-top:4px"><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:'+condColor+';background:'+condColor+'18">'+condLabel+'</span></div>';
  h += '</div></div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">';
  var fields = [
    ['Тип', t.ttype==='new'?'🆕 Нова':'♻️ Б/у'],
    ['Власник', client?'👤 '+esc(client.name):'🔧 Наша'],
    ['Локація', t.location||'—'],
    ['Залишок протектора', t.tread?(t.tread+' мм'):'—'],
    ['Закупівельна', t.buyPrice?fmtM(t.buyPrice):'—'],
    ['Продажна', t.sellPrice?fmtM(t.sellPrice):'—'],
  ];
  fields.forEach(function(f){
    h += '<div style="background:var(--s2);border-radius:8px;padding:9px 10px">';
    h += '<div style="font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;margin-bottom:3px">'+f[0]+'</div>';
    h += '<div style="font-size:13px;font-weight:700">'+f[1]+'</div>';
    h += '</div>';
  });
  h += '</div>';
  if(t.notes) h += '<div style="margin-top:10px;padding:8px 10px;background:var(--s2);border-radius:8px;font-size:12px;color:var(--tx2)">📝 '+esc(t.notes)+'</div>';
  h += '</div></div>';

  // History
  if(t.history&&t.history.length){
    h += '<div class="card" style="margin-bottom:12px">';
    h += '<div class="card-head">Історія</div>';
    t.history.forEach(function(ev){
      h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--b1)">';
      h += '<div style="font-size:18px">'+({added:'➕',repaired:'🔧',sold:'💰',moved:'📦',installed:'⚙️'}[ev.action]||'📋')+'</div>';
      h += '<div style="flex:1"><div style="font-size:12px;font-weight:700">'+(ev.note||ev.action)+'</div>';
      h += '<div style="font-size:10px;color:var(--tx3)">'+ev.date+'</div></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Delete + edit buttons
  h += '<div style="display:flex;gap:8px">';
  h += '<button class="btn btn-ghost" style="flex:1" id="td-history-btn">+ Подія</button>';
  h += '<button class="btn btn-danger btn-sm" id="td-del-btn">🗑️ Видалити</button>';
  h += '</div>';
  h += '</div>';
  el.innerHTML = h;

  document.getElementById('tire-back').onclick = function(){ navTo('tires'); };
  document.getElementById('td-del-btn').onclick = function(){
    if(!confirm('Видалити шину '+t.brand+' '+t.size+'?')) return;
    DB.tires = (DB.tires||[]).filter(function(x){ return String(x.id)!==String(id); });
    DB.save();
    navTo('tires');
  };
  document.getElementById('td-history-btn').onclick = function(){
    var note = prompt('Опис події (напр. Встановлено, Відремонтовано, Продано):');
    if(!note) return;
    if(!t.history) t.history = [];
    t.history.unshift({action:'note', note:note, date:_today()});
    DB.save();
    showTireDetail(id);
  };
}

/* ═══ PRICELIST ═══ */
var _priceCat = null;
var _priceSearch = '';
var _priceEditing = null; // {cat, idx}

function pgPrice(el){
  var cats = Object.keys(SERVICES);
  if(!_priceCat) _priceCat = cats[0];
  var activeCat = _priceCat;

  var h = '<div style="padding-bottom:20px">';

  // Search
  h += '<input type="text" id="price-search" placeholder="🔍 Пошук послуги..." value="'+esc(_priceSearch)+'" style="margin-bottom:12px">';

  if(_priceSearch.trim()){
    var q = _priceSearch.trim().toLowerCase();
    var results = [];
    cats.forEach(function(cat){
      (SERVICES[cat]||[]).forEach(function(s,i){
        if(s.name.toLowerCase().includes(q)) results.push({cat:cat,svc:s,idx:i});
      });
    });
    if(!results.length){
      h += '<div class="empty"><div>🔍</div><div>Нічого не знайдено</div></div>';
    } else {
      h += '<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">Знайдено: '+results.length+'</div>';
      h += '<div class="card">';
      results.forEach(function(r){
        h += buildPriceRow(r.svc, r.cat, r.idx, true);
      });
      h += '</div>';
    }
  } else {
    // Category tabs
    h += '<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px">';
    cats.forEach(function(cat){
      var on = cat===activeCat;
      h += '<button class="price-cat-btn" data-cat="'+esc(cat)+'" style="padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:Arial,sans-serif;background:'+(on?'var(--acc)':'var(--s1)')+';color:'+(on?'#000':'var(--tx3)')+';border:1.5px solid '+(on?'var(--acc)':'var(--b1)')+'">'+esc(cat)+'</button>';
    });
    h += '</div>';

    var svcs = SERVICES[activeCat]||[];
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div style="font-size:12px;color:var(--tx3)">'+svcs.length+' послуг</div>';
    h += '<button class="btn btn-acc btn-sm" id="price-add-btn">+ Послуга</button>';
    h += '</div>';

    h += '<div class="card" id="price-list">';
    if(!svcs.length){
      h += '<div style="padding:20px;text-align:center;color:var(--tx3);font-size:12px">Послуг немає</div>';
    }
    svcs.forEach(function(s,i){
      h += buildPriceRow(s, activeCat, i, false);
    });
    h += '</div>';
  }

  h += '<button class="btn btn-sec btn-full" style="margin-top:12px" id="price-print-btn">🖨️ Роздрукувати прайс-лист</button>';
  h += '</div>';
  el.innerHTML = h;

  // Bind search
  var srch = document.getElementById('price-search');
  if(srch){
    srch.addEventListener('input', function(){
      _priceSearch = this.value;
      _priceEditing = null;
      pgPrice(el);
    });
    // Don't steal focus if already editing
    if(!_priceEditing) srch.focus();
  }

  // Bind category tabs
  el.querySelectorAll('.price-cat-btn').forEach(function(btn){
    btn.onclick = function(){
      _priceCat = this.getAttribute('data-cat');
      _priceSearch = '';
      _priceEditing = null;
      pgPrice(el);
    };
  });

  // Add service
  var addBtn = document.getElementById('price-add-btn');
  if(addBtn) addBtn.onclick = function(){ pgNewService(activeCat); };

  // Print
  var printBtn = document.getElementById('price-print-btn');
  if(printBtn) printBtn.onclick = function(){ printPriceList(); };

  // Bind ALL price action buttons
  bindPriceButtons(el);
}

function buildPriceRow(s, cat, idx, showCat){
  var editing = _priceEditing && _priceEditing.cat===cat && _priceEditing.idx===idx;
  var h = '<div class="price-row" style="border-bottom:1px solid var(--b1)">';

  if(editing){
    // Inline edit form
    h += '<div style="padding:10px 12px;background:rgba(240,165,0,.06)">';
    h += '<div style="font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px">✏️ Редагування</div>';
    h += '<input type="text" id="pe-name" value="'+esc(s.name)+'" placeholder="Назва послуги" style="margin-bottom:8px">';
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
    h += '<div style="flex:1"><label style="margin-top:0">Ціна ₴</label><input type="number" id="pe-price" value="'+(s.price||0)+'" min="0" placeholder="0"></div>';
    h += '</div>';
    h += '<div style="display:flex;gap:8px">';
    h += '<button class="btn btn-ok" style="flex:1" id="pe-save-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'">✓ Зберегти</button>';
    h += '<button class="btn btn-ghost" id="pe-cancel-btn">Скасувати</button>';
    h += '</div></div>';
  } else {
    h += '<div style="display:flex;align-items:center;padding:11px 12px">';
    h += '<div style="flex:1;min-width:0">';
    if(showCat) h += '<div style="font-size:9px;font-weight:700;color:var(--acc);text-transform:uppercase;margin-bottom:2px">'+esc(cat)+'</div>';
    h += '<div style="font-size:13px;font-weight:700;line-height:1.3">'+esc(s.name)+'</div>';
    h += '</div>';
    h += '<div style="font-size:15px;font-weight:900;color:var(--acc);font-family:monospace;flex-shrink:0;margin:0 8px">'+(s.price?fmtM(s.price):'договірна')+'</div>';
    h += '<button class="btn btn-sm price-edit-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'" style="min-height:36px;padding:6px 10px;font-size:14px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);margin-right:4px">✏️</button>';
    h += '<button class="btn btn-sm price-del-btn" data-cat="'+esc(cat)+'" data-idx="'+idx+'" style="min-height:36px;padding:6px 10px;font-size:14px;background:rgba(255,63,87,.1);border:1px solid rgba(255,63,87,.3);color:var(--err)">✕</button>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function bindPriceButtons(el){
  // Edit buttons
  el.querySelectorAll('.price-edit-btn').forEach(function(btn){
    btn.onclick = function(){
      _priceEditing = {
        cat: this.getAttribute('data-cat'),
        idx: parseInt(this.getAttribute('data-idx'))
      };
      pgPrice(el);
    };
  });

  // Delete buttons
  el.querySelectorAll('.price-del-btn').forEach(function(btn){
    btn.onclick = function(){
      var cat = this.getAttribute('data-cat');
      var idx = parseInt(this.getAttribute('data-idx'));
      var svc = SERVICES[cat] && SERVICES[cat][idx];
      if(!svc) return;
      // Inline confirm via UI
      showConfirmDelete(el, cat, idx, svc.name);
    };
  });

  // Save edit
  var saveBtn = document.getElementById('pe-save-btn');
  if(saveBtn){
    saveBtn.onclick = function(){
      var cat = this.getAttribute('data-cat');
      var idx = parseInt(this.getAttribute('data-idx'));
      var nameEl  = document.getElementById('pe-name');
      var priceEl = document.getElementById('pe-price');
      var name  = nameEl  ? nameEl.value.trim()  : '';
      var price = priceEl ? parseFloat(priceEl.value)||0 : 0;
      if(!name){ alert('Введіть назву!'); if(nameEl) nameEl.focus(); return; }
      if(!SERVICES[cat]) return;
      SERVICES[cat][idx] = {name:name, price:price};
      saveServicesToDB();
      _priceEditing = null;
      pgPrice(el);
    };
  }

  // Cancel edit
  var cancelBtn = document.getElementById('pe-cancel-btn');
  if(cancelBtn){
    cancelBtn.onclick = function(){
      _priceEditing = null;
      pgPrice(el);
    };
  }
}

function showConfirmDelete(el, cat, idx, name){
  // Show inline confirm bar at top of content
  var bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;bottom:calc(var(--nav) + 10px);left:50%;transform:translateX(-50%);background:#1a2130;border:1.5px solid var(--err);border-radius:12px;padding:14px 16px;z-index:999;max-width:340px;width:calc(100% - 32px);box-shadow:0 8px 24px rgba(0,0,0,.4)';
  bar.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:10px">Видалити "<span style="color:var(--err)">'+esc(name)+'</span>"?</div>'
    +'<div style="display:flex;gap:8px">'
    +'<button id="conf-yes" style="flex:1;padding:10px;border-radius:8px;background:rgba(255,63,87,.15);border:1.5px solid rgba(255,63,87,.4);color:var(--err);font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">✕ Так, видалити</button>'
    +'<button id="conf-no" style="flex:1;padding:10px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">Скасувати</button>'
    +'</div>';
  document.body.appendChild(bar);

  document.getElementById('conf-yes').onclick = function(){
    bar.remove();
    SERVICES[cat].splice(idx,1);
    saveServicesToDB();
    _priceEditing = null;
    pgPrice(el);
  };

    bar.remove();
  };

/* ═══ SALARY ═══ */
function pgSalary(el){
  var workers = DB.workers||[];
  var orders  = DB.orders||[];
  var now = new Date();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();

  // Parse date
  function parseDate(s){
    if(!s) return null;
    var p=s.split('.'); if(p.length<3) return null;
    return new Date(+p[2],+p[1]-1,+p[0]);
  }

  // Get orders this month
  var mStart = new Date(curYear, curMonth, 1);
  var mEnd   = new Date(curYear, curMonth+1, 0, 23,59,59);
  var monthOrders = orders.filter(function(o){
    var d=parseDate(o.date); return d&&d>=mStart&&d<=mEnd;
  });

  // Calc salary per worker
  function calcWorkerSalary(w){
    if(w.type==='fixed') return w.base||0;
    // percent from orders where master matches worker name
    var workerOrders = monthOrders.filter(function(o){
      return o.master && (
        o.master===w.name ||
        (typeof o.master==='object' && o.master.name===w.name)
      );
    });
    var rev = workerOrders.reduce(function(s,o){ return s+calcT(o.works); },0);
    var base = w.base||0;
    var pct  = rev * ((w.percent||0)/100);
    return base + pct;
  }

  var totalSalary = workers.filter(function(w){ return w.active; }).reduce(function(s,w){ return s+calcWorkerSalary(w); },0);

  var mNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

  var h='<div style="padding-bottom:20px">';

  // Header
  h+='<div style="background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">';
  h+='<div><div style="font-size:11px;color:var(--tx3);text-transform:uppercase;margin-bottom:4px">'+mNames[curMonth]+' '+curYear+'</div>';
  h+='<div style="font-size:11px;color:var(--tx2)">Заказів за місяць: <b style="color:var(--tx)">'+monthOrders.length+'</b></div></div>';
  h+='<div style="text-align:right"><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px">Фонд ЗП</div>';
  h+='<div style="font-size:24px;font-weight:900;color:var(--acc);font-family:monospace">'+fmtM(totalSalary)+'</div></div>';
  h+='</div>';

  // Add worker button
  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-acc btn-sm" id="sal-add-btn">+ Майстер</button></div>';

  // Workers list
  workers.forEach(function(w){
    if(!w.active) return;
    var sal = calcWorkerSalary(w);
    var wOrders = monthOrders.filter(function(o){
      return o.master&&(o.master===w.name||(typeof o.master==='object'&&o.master.name===w.name));
    });
    var wRev = wOrders.reduce(function(s,o){ return s+calcT(o.works); },0);

    h+='<div class="card" style="margin-bottom:10px">';
    h+='<div style="padding:14px 16px">';
    // Header
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    h+='<div class="avatar" style="flex-shrink:0">'+av(w.name)+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(w.name)+'</div>';
    h+='<div style="font-size:11px;color:var(--tx3)">'+esc(w.role||'Майстер')+'</div></div>';
    h+='<div style="text-align:right">';
    h+='<div style="font-size:10px;color:var(--tx3)">До виплати</div>';
    h+='<div style="font-size:20px;font-weight:900;color:var(--ok);font-family:monospace">'+fmtM(sal)+'</div>';
    h+='</div></div>';
    // Stats
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px">';
    h+='<div style="text-align:center;padding:8px;background:var(--s2);border-radius:8px">';
    h+='<div style="font-size:15px;font-weight:900;color:var(--acc)">'+wOrders.length+'</div>';
    h+='<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:1px">Заказів</div></div>';
    h+='<div style="text-align:center;padding:8px;background:var(--s2);border-radius:8px">';
    h+='<div style="font-size:15px;font-weight:900;color:var(--info);font-family:monospace">'+fmtM(wRev)+'</div>';
    h+='<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:1px">Виручка</div></div>';
    h+='<div style="text-align:center;padding:8px;background:var(--s2);border-radius:8px">';
    h+='<div style="font-size:14px;font-weight:900;color:var(--tx2)">'+(w.type==='percent'?(w.percent+'%'):'Фікс.')+'</div>';
    h+='<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;margin-top:1px">Тип ЗП</div></div>';
    h+='</div>';

    // Progress bar
    if(w.type==='percent'){
      h+='<div style="margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:4px">';
      h+='<span>Відсоток від виручки ('+w.percent+'%)</span><span>'+fmtM(wRev)+' → '+fmtM(sal)+'</span></div>';
      h+='<div style="height:6px;background:var(--b1);border-radius:3px">';
      var maxRev2 = Math.max(wRev, 1);
      h+='<div style="height:6px;background:linear-gradient(90deg,var(--ok),var(--acc));border-radius:3px;width:100%"></div>';
      h+='</div></div>';
    }

    // This month orders
    if(wOrders.length){

/* ═══ FINANCE ═══ */
function pgFinance(el){
  var orders = DB.orders;
  var now = new Date();
  var todayStr = _today();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();

  // Helper: parse date string dd.mm.yyyy
  function parseDate(s){
    if(!s) return null;
    var p = s.split('.');
    if(p.length<3) return null;
    return new Date(+p[2], +p[1]-1, +p[0]);
  }

  // Filter by period
  function ordersIn(from, to){
    return orders.filter(function(o){
      var d = parseDate(o.date);
      if(!d) return false;
      return d >= from && d <= to;
    });
  }

  var todayStart = new Date(curYear, curMonth, now.getDate());
  var monthStart = new Date(curYear, curMonth, 1);
  var yearStart  = new Date(curYear, 0, 1);
  var todayEnd   = new Date(curYear, curMonth, now.getDate(), 23, 59, 59);

  var todayOrders = ordersIn(todayStart, todayEnd);
  var monthOrders = ordersIn(monthStart, new Date());
  var yearOrders  = ordersIn(yearStart,  new Date());

  function rev(arr){ return arr.reduce(function(s,o){ return s+calcT(o.works); },0); }
  function cnt(arr){ return arr.length; }
  function paid(arr){ return arr.filter(function(o){ return o.status==='completed'; }).length; }
  function debtAmt(arr){ return arr.filter(function(o){ return o.status==='debt'; }).reduce(function(s,o){ return s+calcT(o.works); },0); }

  var revToday = rev(todayOrders);
  var revMonth = rev(monthOrders);
  var revYear  = rev(yearOrders);

  var totalDebt = DB.clients.reduce(function(s,c){ return s+(c.debt||0); },0);

  // Monthly breakdown (last 6 months)
  var months = [];
  for(var i=5; i>=0; i--){
    var d = new Date(curYear, curMonth-i, 1);
    var mStart = new Date(d.getFullYear(), d.getMonth(), 1);
    var mEnd   = new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59);
    var mOrders = ordersIn(mStart, mEnd);
    var mNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
    months.push({
      label: mNames[d.getMonth()]+' '+d.getFullYear(),
      rev: rev(mOrders),
      cnt: mOrders.length
    });
  }

  var maxRev = months.reduce(function(m,x){ return Math.max(m,x.rev); },1);

  // Top services
  var svcMap = {};
  orders.forEach(function(o){
    (o.works||[]).forEach(function(w){
      if(!w.name) return;
      if(!svcMap[w.name]) svcMap[w.name] = {cnt:0, rev:0};
      svcMap[w.name].cnt += (w.qty||1);
      svcMap[w.name].rev += (w.qty||1)*(w.price||0);
    });
  });
  var topSvcs = Object.keys(svcMap).map(function(k){ return {name:k, cnt:svcMap[k].cnt, rev:svcMap[k].rev}; });
  topSvcs.sort(function(a,b){ return b.rev-a.rev; });
  topSvcs = topSvcs.slice(0,8);

  // Payment breakdown
  var payMap = {cash:0, card:0, partial:0, debt:0};
  orders.forEach(function(o){ payMap[o.pay||'cash'] = (payMap[o.pay||'cash']||0) + calcT(o.works); });
  var payTotal = Object.keys(payMap).reduce(function(s,k){ return s+payMap[k]; },0)||1;

  var h = '<div style="padding-bottom:20px">';

  // Period selector
  h += '<div style="display:flex;gap:6px;margin-bottom:14px">';
  ['Сьогодні','Місяць','Рік'].forEach(function(lbl,i){
    h += '<button class="fin-period" data-i="'+i+'" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;background:'+(i===1?'var(--acc)':'var(--s1)')+';color:'+(i===1?'#000':'var(--tx3)')+';border:1.5px solid '+(i===1?'var(--acc)':'var(--b1)')+'">'+lbl+'</button>';
  });
  h += '</div>';

  // KPI cards
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';
  var kpis = [
    {l:'Сьогодні',v:fmtM(revToday), sub:cnt(todayOrders)+' заказів', c:'var(--acc)'},
    {l:'Цей місяць',v:fmtM(revMonth), sub:cnt(monthOrders)+' заказів', c:'var(--ok)'},
    {l:'Цей рік',v:fmtM(revYear), sub:cnt(yearOrders)+' заказів', c:'var(--info)'},
    {l:'Борги клієнтів',v:fmtM(totalDebt), sub:DB.clients.filter(function(c){return c.debt>0;}).length+' боржників', c:'var(--err)'},
  ];
  kpis.forEach(function(k){
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px">';
    h += '<div style="font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">'+k.l+'</div>';
    h += '<div style="font-size:20px;font-weight:900;color:'+k.c+';font-family:monospace">'+k.v+'</div>';
    h += '<div style="font-size:11px;color:var(--tx2);margin-top:3px">'+k.sub+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // Bar chart — last 6 months
  h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:14px">';
  h += '<div style="font-size:13px;font-weight:700;margin-bottom:14px">📊 Виручка по місяцях</div>';
  h += '<div style="display:flex;align-items:flex-end;gap:8px;height:120px">';
  months.forEach(function(m){
    var pct = maxRev > 0 ? Math.round((m.rev/maxRev)*100) : 0;
    var barH = Math.max(pct, m.rev>0?4:0);
    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">';

    h += '<div style="width:100%;background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:4px 4px 0 0;height:'+barH+'%;min-height:'+(m.rev>0?'4px':'0')+'"></div>';
    h += '</div>';
    h += '<div style="font-size:9px;color:var(--tx2);text-align:center;white-space:nowrap">'+m.label+'</div>';
    h += '</div>';
  });
  h += '</div></div>';

  // Payment types
  h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:14px">';
  h += '<div style="font-size:13px;font-weight:700;margin-bottom:12px">💳 Типи оплат</div>';
  var payLabels = {cash:'💵 Готівка', card:'💳 Картка', partial:'🔀 Часткова', debt:'📋 Борг'};
  var payColors = {cash:'var(--ok)', card:'var(--info)', partial:'var(--acc)', debt:'var(--err)'};
  Object.keys(payMap).forEach(function(k){
    if(!payMap[k]) return;
    var pct = Math.round(payMap[k]/payTotal*100);
    h += '<div style="margin-bottom:10px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
    h += '<span style="font-size:12px;font-weight:700">'+payLabels[k]+'</span>';
    h += '<span style="font-size:12px;font-family:monospace;color:'+payColors[k]+'">'+fmtM(payMap[k])+' ('+pct+'%)</span>';
    h += '</div>';
    h += '<div style="height:8px;background:var(--b1);border-radius:4px"><div style="height:8px;background:'+payColors[k]+';border-radius:4px;width:'+pct+'%;transition:width .4s"></div></div>';
    h += '</div>';
  });
  h += '</div>';

  // Top services
  if(topSvcs.length){
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:14px">';
    h += '<div style="padding:12px 16px;border-bottom:1px solid var(--b1);font-size:13px;font-weight:700">🔧 Топ послуг</div>';
    topSvcs.forEach(function(s,i){
      h += '<div style="display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--b1)">';
      h += '<div style="width:22px;height:22px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--acc);margin-right:10px;flex-shrink:0">'+(i+1)+'</div>';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.name)+'</div>';
      h += '<div style="font-size:10px;color:var(--tx3)">'+s.cnt+' шт</div></div>';
      h += '<div style="font-size:14px;font-weight:900;color:var(--acc);font-family:monospace;flex-shrink:0">'+fmtM(s.rev)+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Recent completed orders
  var recent = orders.filter(function(o){ return o.status==='completed'; }).slice(0,5);
  if(recent.length){
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden">';
    h += '<div style="padding:12px 16px;border-bottom:1px solid var(--b1);font-size:13px;font-weight:700">✅ Останні оплачені</div>';
    recent.forEach(function(o){
      h += '<div style="display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--b1);cursor:pointer" onclick="showDetail(\''+o.id+'\')">';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:12px;color:var(--acc);font-weight:700;font-family:monospace">'+o.id+'</div>';
      h += '<div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(o.client?esc(o.client.name):'—')+'</div>';
      h += '<div style="font-size:11px;color:var(--tx3)">'+o.date+'</div>';
      h += '</div>';
      h += '<div style="font-size:15px;font-weight:900;color:var(--ok);font-family:monospace">'+fmtM(calcT(o.works))+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  el.innerHTML = h;
}

/* ═══ NOTIFICATIONS ═══ */
var NOTIFS = [];

function loadNotifs(){
  try{ var s=localStorage.getItem('gt_notifs'); if(s) NOTIFS=JSON.parse(s); }catch(e){}
  autoGenNotifs();
}
function saveNotifs(){
  try{ localStorage.setItem('gt_notifs',JSON.stringify(NOTIFS)); }catch(e){}
}

function autoGenNotifs(){
  // Auto-generate system notifications based on data
  var auto = [];

  // 1. Critical warehouse stock
  (DB.warehouse||[]).forEach(function(w){
    if(w.stock<=w.min){
      auto.push({
        id:'wh_'+w.id, type:'stock', priority:'high',
        title:'⚠️ Критичний залишок',
        text:w.name+': '+w.stock+' '+w.unit+' (мін: '+w.min+')',
        date:_today(), read:false, auto:true
      });
    }
  });

  // 2. Client debts
  (DB.clients||[]).forEach(function(c){
    if(c.debt>0){
      auto.push({
        id:'debt_'+c.id, type:'debt', priority:'high',
        title:'💰 Борг клієнта',
        text:c.name+': '+fmtM(c.debt),
        date:_today(), read:false, auto:true
      });
    }
  });

  // 3. Orders waiting >1 day
  (DB.orders||[]).filter(function(o){ return o.status==='waiting'; }).forEach(function(o){
    auto.push({
      id:'wait_'+o.id, type:'order', priority:'medium',
      title:'🕐 Заказ очікує',
      text:o.id+' · '+(o.client?o.client.name:'')+(o.plate?' · '+o.plate:''),
      date:o.date, read:false, auto:true
    });
  });

  // Merge auto notifs — don't duplicate
  var existingIds = NOTIFS.map(function(n){ return n.id; });
  auto.forEach(function(n){
    if(!existingIds.includes(n.id)){
      NOTIFS.unshift(n);
    } else {
      // Update text
      var idx = NOTIFS.findIndex(function(x){ return x.id===n.id; });
      if(idx>=0){ NOTIFS[idx].text=n.text; NOTIFS[idx].title=n.title; }
    }
  });

  // Remove auto notifs that no longer apply
  NOTIFS = NOTIFS.filter(function(n){
    if(!n.auto) return true;
    return auto.some(function(a){ return a.id===n.id; });
  });

  updateBadge();
  saveNotifs();
}

function updateBadge(){
  var unread = NOTIFS.filter(function(n){ return !n.read; }).length;
  var badge = document.getElementById('notif-badge');
  if(badge){
    badge.textContent = unread > 9 ? '9+' : String(unread);
    badge.style.display = unread > 0 ? 'flex' : 'none';
  }
}

function toggleNotifPanel(){
  var panel = document.getElementById('notif-panel');
  if(!panel){
    createNotifPanel();
    return;
  }
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
  } else {
    renderNotifPanel();
    panel.classList.add('open');
    // Mark all as read
    NOTIFS.forEach(function(n){ n.read=true; });
    saveNotifs();
    updateBadge();
  }
}

function createNotifPanel(){
  var panel = document.createElement('div');
  panel.id = 'notif-panel';
  document.body.appendChild(panel);
  renderNotifPanel();
  panel.classList.add('open');
  NOTIFS.forEach(function(n){ n.read=true; });
  saveNotifs();
  updateBadge();
}

function renderNotifPanel(){
  var panel = document.getElementById('notif-panel');
  if(!panel) return;

  var typeColors = {stock:'var(--err)',debt:'var(--err)',order:'var(--acc)',reminder:'var(--ok)',info:'var(--info)'};
  var h = '';

  // Header
  h += '<div style="padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--s1);z-index:1">';
  h += '<div style="font-size:14px;font-weight:800">🔔 Сповіщення</div>';
  h += '<div style="display:flex;gap:8px">';
  h += '<button id="notif-add-btn" style="padding:5px 10px;border-radius:6px;background:var(--acc);border:none;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">+ Нагадування</button>';
  h += '<button id="notif-close" style="padding:5px 10px;border-radius:6px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:11px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">✕</button>';
  h += '</div></div>';

  if(!NOTIFS.length){
    h += '<div style="padding:32px 16px;text-align:center;color:var(--tx3)"><div style="font-size:32px;margin-bottom:8px">✅</div><div>Сповіщень немає</div></div>';
  } else {
    NOTIFS.forEach(function(n, i){
      var c = typeColors[n.type]||'var(--info)';
      h += '<div class="notif-item" style="padding:12px 16px;border-bottom:1px solid var(--b1);background:'+(n.read?'transparent':'rgba(240,165,0,.04)')+';display:flex;gap:10px;align-items:flex-start">';
      h += '<div style="width:8px;height:8px;border-radius:50%;background:'+(n.read?'transparent':c)+';flex-shrink:0;margin-top:5px"></div>';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:12px;font-weight:800;color:'+c+';margin-bottom:2px">'+esc(n.title)+'</div>';
      h += '<div style="font-size:12px;color:var(--tx2);line-height:1.4">'+esc(n.text)+'</div>';
      h += '<div style="font-size:10px;color:var(--tx3);margin-top:3px">'+n.date+'</div>';
      h += '</div>';
      if(!n.auto){
        h += '<button class="notif-del-btn" data-idx="'+i+'" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;flex-shrink:0;padding:0">✕</button>';
      }
      h += '</div>';
    });

    h += '<div style="padding:12px 16px">';
    h += '<button id="notif-clear-auto" style="width:100%;padding:9px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif">Оновити сповіщення</button>';
    h += '</div>';
  }

  panel.innerHTML = h;

  // Bind buttons
  var closeBtn = document.getElementById('notif-close');
  if(closeBtn) closeBtn.onclick = function(){ panel.classList.remove('open'); };

  var addBtn = document.getElementById('notif-add-btn');
  if(addBtn) addBtn.onclick = function(){ panel.classList.remove('open'); showAddReminder(); };

  var clearBtn = document.getElementById('notif-clear-auto');
  if(clearBtn) clearBtn.onclick = function(){
    autoGenNotifs();
    renderNotifPanel();
  };

  panel.querySelectorAll('.notif-del-btn').forEach(function(btn){
    btn.onclick = function(){
      var idx = parseInt(this.getAttribute('data-idx'));
      NOTIFS.splice(idx,1);
      saveNotifs();
      renderNotifPanel();
      updateBadge();
    };
  });
}

function showAddReminder(){
  var el = document.getElementById('content');
  setTitle('Нове нагадування');
  var h = '<div>';
  h += '<div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" id="rem-back">← Назад</button></div>';
  h += '<div class="fgroup"><h3>🔔 Нове нагадування</h3>';
  h += '<label>Заголовок *</label><input type="text" id="rem-title" placeholder="Зателефонувати клієнту, Купити латки..." autocomplete="off">';
  h += '<label>Текст / Деталі</label><input type="text" id="rem-text" placeholder="Деталі нагадування..." autocomplete="off">';
  h += '<label>Дата</label><input type="date" id="rem-date" style="font-family:Arial,sans-serif">';
  h += '<label>Тип</label>';
  h += '<select id="rem-type">';
  h += '<option value="reminder">🔔 Нагадування</option>';
  h += '<option value="order">📄 Заказ</option>';
  h += '<option value="debt">💰 Борг</option>';
  h += '<option value="stock">📦 Склад</option>';
  h += '<option value="info">ℹ️ Інформація</option>';
  h += '</select>';
  h += '</div>';
  h += '<div class="action-bar"><button class="btn btn-ghost" id="rem-cancel">Скасувати</button><button class="btn btn-ok" style="flex:1" id="rem-save">✓ Зберегти</button></div>';
  h += '</div>';
  el.innerHTML = h;

  // Set today as default date
  var dateEl = document.getElementById('rem-date');
  if(dateEl){
    var now = new Date();
    dateEl.value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  }

  document.getElementById('rem-back').onclick   = function(){ window.history.back ? navTo(_page) : navTo('dashboard'); };
  document.getElementById('rem-cancel').onclick = function(){ navTo(_page||'dashboard'); };
  document.getElementById('rem-save').onclick   = function(){
    var title = (document.getElementById('rem-title')||{value:''}).value.trim();
    if(!title){ alert('Введіть заголовок!'); document.getElementById('rem-title').focus(); return; }
    var text  = (document.getElementById('rem-text') ||{value:''}).value.trim();
    var date  = (document.getElementById('rem-date') ||{value:_today()}).value;
    var type  = (document.getElementById('rem-type') ||{value:'reminder'}).value;
    // Convert date from yyyy-mm-dd to dd.mm.yyyy
    var dp = date.split('-');
    var dateStr = dp.length===3 ? dp[2]+'.'+dp[1]+'.'+dp[0] : _today();
    var notif = {
      id: 'rem_'+Date.now(),
      type: type,
      priority: 'medium',
      title: title,
      text: text,
      date: dateStr,
      read: false,
      auto: false
    };
    NOTIFS.unshift(notif);
    saveNotifs();
    updateBadge();
    alert('✅ Нагадування збережено!');
    navTo(_page||'dashboard');
  };
}

function buildReport(id){
  var now = new Date();
  var curMonth = now.getMonth();
  var curYear  = now.getFullYear();
  function parseDate(s){ if(!s)return null; var p=s.split('.'); if(p.length<3)return null; return new Date(+p[2],+p[1]-1,+p[0]); }
  var mStart = new Date(curYear,curMonth,1);
  var mEnd   = new Date(curYear,curMonth+1,0,23,59,59);
  function inMonth(o){ var d=parseDate(o.date); return d&&d>=mStart&&d<=mEnd; }

  if(id==='orders-month'){
    var orders = DB.orders.filter(inMonth);
    var tot = orders.reduce(function(s,o){ return s+calcT(o.works); },0);
    var rows = orders.map(function(o,i){
      return '<tr style="background:'+(i%2?'#fafafa':'#fff')+'">'
        +'<td style="padding:6px 8px;font-size:11px;font-family:monospace;font-weight:700;color:#f0a500">'+o.id+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+esc(o.client?o.client.name:'—')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px;font-family:monospace">'+esc(o.plate||'')+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+o.date+' '+o.time+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(o.works||[]).map(function(w){return esc(w.name)+' ×'+w.qty;}).join(', ')+'</td>'
        +'<td style="padding:6px 8px;font-size:12px;font-weight:700;text-align:right;font-family:monospace">'+fmtM(calcT(o.works))+'</td>'
        +'<td style="padding:6px 8px;font-size:11px">'+(ST[o.status]?'<span style="color:'+ST[o.status].c+'">'+ST[o.status].l+'</span>':o.status)+'</td>'
        +'</tr>';
    }).join('');
    return repHeader('Звіт по заказах')
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
      +[['Заказів',orders.length],['Виконано',orders.filter(function(o){return o.status==='completed';}).length],['Виручка',fmtM(tot)],['Боргів',fmtM(orders.filter(function(o){return o.status==='debt';}).reduce(function(s,o){return s+calcT(o.works);},0))]].map(function(k){
        return '<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:10px;text-align:center"><div style="font-size:16px;font-weight:900">'+k[1]+'</div><div style="font-size:9px;color:#888;text-transform:uppercase;margin-top:2px">'+k[0]+'</div></div>';
      }).join('')+'</div>'
      +'<table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f0a500"><th style="padding:6px 8px;text-align:left;font-size:10px">№</th><th style="padding:6px 8px;text-align:left;font-size:10px">Клієнт</th><th style="padding:6px 8px;text-align:left;font-size:10px">Номер авто</th><th style="padding:6px 8px;text-align:left;font-size:10px">Дата</th><th style="padding:6px 8px;text-align:left;font-size:10px">Роботи</th><th style="padding:6px 8px;text-align:right;font-size:10px">Сума</th><th style="padding:6px 8px;text-align:left;font-size:10px">Статус</th></tr></thead><tbody>'+rows+'</tbody>'
      +'<tfoot><tr style="background:#f0a500"><td colspan="5" style="padding:8px;font-weight:900;font-size:13px">ЗАГАЛЬНА ВИРУЧКА:</td><td style="padding:8px;font-weight:900;font-size:14px;text-align:right;font-family:monospace">'+fmtM(tot)+'</td><td></td></tr></tfoot></table>';
  }

  if(id==='revenue'){
    var orders2 = DB.orders;
    var tot2 = orders2.reduce(function(s,o){ return s+calcT(o.works); },0);
    var paid2 = orders2.filter(function(o){ return o.status==='completed'; }).reduce(function(s,o){ return s+calcT(o.works); },0);
    var debt2 = DB.clients.reduce(function(s,c){ return s+(c.debt||0); },0);
    var payMap = {cash:0,card:0,partial:0,debt:0};
    orders2.forEach(function(o){ payMap[o.pay||'cash']+= calcT(o.works); });
    var payLabels = {cash:'💵 Готівка',card:'💳 Картка',partial:'🔀 Часткова',debt:'📋 Борг'};
    return repHeader('Звіт по виручці')
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'
      +[['Загальна виручка',fmtM(tot2)],['Оплачено',fmtM(paid2)],['Борги',fmtM(debt2)]].map(function(k){
        return '<div style="background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:18px;font-weight:900">'+k[1]+'</div><div style="font-size:9px;color:#888;text-transform:uppercase;margin-top:3px">'+k[0]+'</div></div>';
      }).join('')+'</div>'
      +'<table style="width:100%;border-collapse:collapse;margin-bottom:16px"><thead><tr style="background:#f0a500"><th style="padding:6px 10px;text-align:left;font-size:10px">Спосіб оплати</th><th style="padding:6px 10px;text-align:right;font-size:10px">Сума</th></tr></thead><tbody>'
